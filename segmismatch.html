<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スライド結合ツール</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; color: #333; }
        .container { background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        h1 { font-size: 1.4em; text-align: center; margin-bottom: 20px; color: #222; }
        .desc { font-size: 0.85em; color: #555; margin-top: -10px; margin-bottom: 20px; line-height: 1.4; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; }
        input[type="text"], input[type="file"] { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 1em; }
        
        .range-group { background: #f9f9f9; border: 2px solid #e2e8f0; border-radius: 8px; padding: 15px; margin-bottom: 15px; position: relative; }
        .range-group h4 { margin-top: 0; margin-bottom: 15px; font-size: 1.1em; color: #4a5568; border-bottom: 2px solid #e2e8f0; padding-bottom: 5px; }
        
        button { padding: 12px 20px; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1em; width: 100%; font-weight: bold; transition: 0.2s; }
        .btn-add { background: #17a2b8; margin-bottom: 20px; }
        .btn-add:hover { background: #138496; }
        .btn-remove { background: #dc3545; padding: 8px 15px; margin-top: 5px; font-size: 0.9em; width: auto; float: right; }
        .btn-remove:hover { background: #c82333; }
        .btn-process { background: #28a745; font-size: 1.1em; padding: 15px; box-shadow: 0 4px 6px rgba(40, 167, 69, 0.3); }
        .btn-process:hover { background: #218838; }
        
        .clearfix::after { content: ""; clear: both; display: table; }
        #dlLink { display: none; margin-top: 20px; text-align: center; padding: 15px; background: #007bff; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; transition: 0.2s; box-shadow: 0 4px 6px rgba(0, 123, 255, 0.3); }
        #dlLink:hover { background: #0056b3; }
        #resultMsg { margin-top: 15px; font-size: 0.95em; font-weight: bold; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <h1>スライド結合ツール</h1>
    <p class="desc">
        始点が一番早いスライドを「メイン幹」とします。<br>
        幹の軌道を一筆書きでなぞりながら枝の往復を描き、<b>一番最後に「幹の終点(最後のseg)」を配置して蓋をします。</b><br>
        装飾が幹の終点より未来にある場合は、自動で幹を逆行して戻るため意図しない直線は発生しません。
    </p>
    
    <div class="form-group" style="margin-bottom: 20px;">
        <label>📁 .mcファイルを選択</label>
        <input type="file" id="mcFile" accept="*/*">
    </div>

    <div id="rangesContainer">
        <div class="range-group clearfix" id="range-0">
            <h4>範囲 1</h4>
            <div class="form-group">
                <label>始点Beat (メインスライドの開始位置など)</label>
                <input type="text" class="startBeat" placeholder="例: 449, 0, 1">
            </div>
            <div class="form-group">
                <label>終点Beat</label>
                <input type="text" class="endBeat" placeholder="例: 460, 0, 0">
            </div>
            <button type="button" class="btn-remove" onclick="removeRange('range-0')">🗑️ 削除</button>
        </div>
    </div>

    <button type="button" class="btn-add" onclick="addRange()">➕ 選択範囲を追加する</button>
    <button type="button" class="btn-process" onclick="processMC()">🚀 結合を実行</button>

    <div id="resultMsg"></div>
    <a id="dlLink" href="#">💾 結合済みファイルをダウンロード</a>
</div>

<script>
let rangeIdCounter = 1;

function addRange() {
    const container = document.getElementById("rangesContainer");
    const id = "range-" + rangeIdCounter++;
    const html = `
    <div class="range-group clearfix" id="${id}">
        <h4>範囲指定</h4>
        <div class="form-group">
            <label>始点Beat</label>
            <input type="text" class="startBeat" placeholder="例: 449, 0, 1">
        </div>
        <div class="form-group">
            <label>終点Beat</label>
            <input type="text" class="endBeat" placeholder="例: 460, 0, 0">
        </div>
        <button type="button" class="btn-remove" onclick="removeRange('${id}')">🗑️ 削除</button>
    </div>
    `;
    container.insertAdjacentHTML('beforeend', html);
    updateRangeLabels();
}

function removeRange(id) {
    const container = document.getElementById("rangesContainer");
    if (container.children.length <= 1) {
        alert("最低でも1つの範囲指定が必要です！");
        return;
    }
    document.getElementById(id).remove();
    updateRangeLabels();
}

function updateRangeLabels() {
    const groups = document.querySelectorAll('.range-group h4');
    groups.forEach((el, index) => {
        el.innerText = `範囲 ${index + 1}`;
    });
}

function beatToPoint(beat) {
    if (!beat || beat.length !== 3) return 0;
    if (beat[2] === 0) return beat[0];
    return beat[0] + (beat[1] / beat[2]);
}

function parseBeat(str) {
    if (!str) return null;
    str = str.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));
    const parts = str.match(/-?\d+/g);
    if (parts && parts.length >= 3) {
        return [Number(parts[0]), Number(parts[1]), Number(parts[2])];
    }
    return null;
}

function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }

function beatDiff(beat1, beat2) {
    if (!beat1) return[0, 0, 0];
    if (!beat2) return[...beat1];
    const m1 = beat1[0], n1 = beat1[1] || 0, d1 = beat1[2] === 0 ? 1 : (beat1[2] || 1);
    const m2 = beat2[0], n2 = beat2[1] || 0, d2 = beat2[2] === 0 ? 1 : (beat2[2] || 1);
    const num1 = (m1 * d1 + n1) * d2;
    const num2 = (m2 * d2 + n2) * d1;
    const den = d1 * d2;
    let diffNum = num1 - num2;
    if (diffNum < 0) diffNum = 0; 
    const m = Math.floor(diffNum / den);
    const n = diffNum % den;
    if (n === 0) return[m, 0, 0];
    const g = gcd(n, den);
    return[m, n / g, den / g];
}

function beatAdd(beat1, beat2) {
    if (!beat1) return[...beat2];
    if (!beat2) return [...beat1];
    const m1 = beat1[0], n1 = beat1[1] || 0, d1 = beat1[2] === 0 ? 1 : (beat1[2] || 1);
    const m2 = beat2[0], n2 = beat2[1] || 0, d2 = beat2[2] === 0 ? 1 : (beat2[2] || 1);
    const num1 = n1 * d2;
    const num2 = n2 * d1;
    const den = d1 * d2;
    let num = num1 + num2;
    let m = m1 + m2 + Math.floor(num / den);
    let n = num % den;
    if (n === 0) return[m, 0, 0];
    const g = gcd(n, den);
    return[m, n / g, den / g];
}

function getRelXAt(mainPoints, targetPoint) {
    if (mainPoints.length === 1) return mainPoints[0].relX;
    if (targetPoint <= mainPoints[0].point) return mainPoints[0].relX;
    if (targetPoint >= mainPoints[mainPoints.length - 1].point) return mainPoints[mainPoints.length - 1].relX;
    
    for (let i = 0; i < mainPoints.length - 1; i++) {
        let p1 = mainPoints[i];
        let p2 = mainPoints[i+1];
        if (p1.point <= targetPoint && targetPoint <= p2.point) {
            if (Math.abs(p2.point - p1.point) < 1e-10) return p2.relX;
            let t = (targetPoint - p1.point) / (p2.point - p1.point);
            return p1.relX + (p2.relX - p1.relX) * t;
        }
    }
    return mainPoints[mainPoints.length - 1].relX;
}

// 重複バグ修復パトロール (1万分の1ずらし)
function fixDuplicateSegs(segArray) {
    let usedPoints =[];
    let fixedCount = 0;
    const MICRO_DEN = 10000; 
    
    function addMicroOffset(beat, offsetCount) {
        if (!beat || beat.length !== 3 || offsetCount === 0) return beat;
        const m = beat[0], n = beat[1] || 0, d = beat[2] === 0 ? 1 : beat[2];
        let newNum = n * MICRO_DEN + offsetCount * d;
        let newDen = d * MICRO_DEN;
        let extraM = Math.floor(newNum / newDen);
        let newM = m + extraM;
        newNum = newNum % newDen;
        if (newNum === 0) return[newM, 0, 0];
        let g = gcd(newNum, newDen);
        return[newM, newNum / g, newDen / g];
    }

    for (let i = segArray.length - 1; i >= 0; i--) {
        let segItem = segArray[i];
        let p = beatToPoint(segItem.beat);
        
        let conflictCount = 0;
        let currentP = p;
        
        while (true) {
            let isConflict = false;
            for (let j = 0; j < usedPoints.length; j++) {
                if (Math.abs(currentP - usedPoints[j]) < 1e-5) {
                    isConflict = true;
                    break;
                }
            }
            if (!isConflict) break;
            conflictCount++;
            currentP = p + (conflictCount / MICRO_DEN);
        }
        
        if (conflictCount > 0) {
            segItem.beat = addMicroOffset(segItem.beat, conflictCount);
            fixedCount++;
        }
        usedPoints.push(currentP);
    }
    return fixedCount;
}

function processMC() {
    const fileInput = document.getElementById("mcFile");
    const msgDiv = document.getElementById("resultMsg");
    const dlLink = document.getElementById("dlLink");
    
    msgDiv.innerHTML = "";
    msgDiv.style.color = "#333";
    dlLink.style.display = "none";

    if (!fileInput.files.length) {
        msgDiv.style.color = "#d32f2f";
        return msgDiv.innerHTML = "ファイルを選択してください。";
    }

    const rangeGroups = document.querySelectorAll('.range-group');
    const ranges =[];
    
    for (let i = 0; i < rangeGroups.length; i++) {
        const startStr = rangeGroups[i].querySelector('.startBeat').value;
        const endStr = rangeGroups[i].querySelector('.endBeat').value;
        const startBeat = parseBeat(startStr);
        const endBeat = parseBeat(endStr);
        
        if (!startBeat || !endBeat) {
            msgDiv.style.color = "#d32f2f";
            return msgDiv.innerHTML = `⚠️ 範囲 ${i + 1} のBeatフォーマットが正しくありません。`;
        }
        
        const startPoint = beatToPoint(startBeat);
        const endPoint = beatToPoint(endBeat);
        ranges.push({
            index: i + 1,
            min: Math.min(startPoint, endPoint),
            max: Math.max(startPoint, endPoint)
        });
    }

    const file = fileInput.files[0];
    const reader = new FileReader();
    
    reader.onload = function(e) {
        try {
            const data = JSON.parse(e.target.result);
            if (!data.note) {
                msgDiv.style.color = "#d32f2f";
                return msgDiv.innerHTML = "無効な譜面データです。";
            }

            const notes = data.note;
            let allDeletedNotes = new Set();
            let totalJoinedCount = 0;
            let resultLogs =[];

            for (let r = 0; r < ranges.length; r++) {
                const range = ranges[r];
                const targetSlides =[];

                for (let i = 0; i < notes.length; i++) {
                    const note = notes[i];
                    if (allDeletedNotes.has(note)) continue;

                    if (note.seg && Array.isArray(note.seg)) {
                        const point = beatToPoint(note.beat);
                        if (point >= range.min - 0.001 && point <= range.max + 0.001) {
                            targetSlides.push(note);
                        }
                    }
                }

                if (targetSlides.length < 1) {
                    resultLogs.push(`<span style="color:#d32f2f;">⚠️ 範囲 ${range.index}: 対象スライドが見つからないためスキップ</span>`);
                    continue;
                }

                // 「メイン幹」は必ず始点が一番早いもの
                targetSlides.sort((a, b) => beatToPoint(a.beat) - beatToPoint(b.beat));
                const mainSlide = targetSlides[0];
                const mainBeat = mainSlide.beat;
                const mainX = (typeof mainSlide.x === 'number') ? mainSlide.x : 0;

                // 幹の補間用の座標配列を作成
                let mainPoints =[ { point: 0, relX: 0 } ];
                if (mainSlide.seg) {
                    for (let s of mainSlide.seg) {
                        mainPoints.push({ point: beatToPoint(s.beat), relX: s.x });
                    }
                }

                let branches = targetSlides.slice(1);
                let events =[];
                
                // メイン幹の「最後のseg」を判定の蓋として取り除いておく
                let mainOriginalSegs = mainSlide.seg ||[];
                let mainLastSeg = null;
                let mainLastPoint = 0;
                
                if (mainOriginalSegs.length > 0) {
                    mainLastSeg = mainOriginalSegs[mainOriginalSegs.length - 1];
                    mainLastPoint = beatToPoint(mainLastSeg.beat);
                    
                    // 最後以外の途中segを、一筆書きのイベントとして登録
                    for (let i = 0; i < mainOriginalSegs.length - 1; i++) {
                        let s = mainOriginalSegs[i];
                        events.push({
                            type: 'main_seg',
                            point: beatToPoint(s.beat),
                            beat: s.beat,
                            x: s.x
                        });
                    }
                }

                // 枝の分岐点(終点タイミング)をイベントに登録
                if (branches.length > 0) {
                    for (let i = 0; i < branches.length; i++) {
                        const branch = branches[i];
                        const branchSegs = branch.seg ||[];
                        const branchX = (typeof branch.x === 'number') ? branch.x : 0;
                        const offsetX = branchX - mainX;
                        const offsetBeat = beatDiff(branch.beat, mainBeat);

                        let lastSegBeat = branchSegs.length > 0 ? branchSegs[branchSegs.length - 1].beat : [0,0,0];
                        let endRelBeat = beatAdd(offsetBeat, lastSegBeat);
                        let endRelPoint = beatToPoint(endRelBeat);

                        let trunkRelX = Math.floor(getRelXAt(mainPoints, endRelPoint));

                        events.push({
                            type: 'branch_insert',
                            point: endRelPoint,
                            beat: endRelBeat,
                            x: trunkRelX,
                            branchSegs: branchSegs,
                            offsetX: offsetX,
                            offsetBeat: offsetBeat
                        });
                    }
                }

                // イベントを時間順にソート (同じ時間なら幹のsegを優先)
                events.sort((a, b) => {
                    let diff = a.point - b.point;
                    if (Math.abs(diff) > 1e-10) return diff;
                    if (a.type === 'main_seg' && b.type === 'branch_insert') return -1;
                    if (a.type === 'branch_insert' && b.type === 'main_seg') return 1;
                    return 0;
                });

                const newSeg =[];
                let currentAbsPoint = 0;
                
                // 一筆書きの生成
                for (let ev of events) {
                    if (ev.type === 'main_seg') {
                        newSeg.push({ beat:[...ev.beat], x: ev.x });
                        currentAbsPoint = ev.point;
                    } else {
                        // 分岐点(幹の現在座標)
                        newSeg.push({ beat:[...ev.beat], x: ev.x }); 

                        // 復路
                        for (let j = ev.branchSegs.length - 1; j >= 0; j--) {
                            let s = ev.branchSegs[j];
                            newSeg.push({ beat: beatAdd(ev.offsetBeat, s.beat), x: ev.offsetX + s.x });
                        }
                        
                        // 始点
                        newSeg.push({ beat:[...ev.offsetBeat], x: ev.offsetX });

                        // 往路
                        for (let j = 0; j < ev.branchSegs.length; j++) {
                            let s = ev.branchSegs[j];
                            newSeg.push({ beat: beatAdd(ev.offsetBeat, s.beat), x: ev.offsetX + s.x });
                        }

                        // 帰還点(幹の現在座標)
                        newSeg.push({ beat:[...ev.beat], x: ev.x }); 
                        currentAbsPoint = ev.point;
                    }
                }

                // ★ NEW：現在地が幹の終点より未来にある場合、幹の軌道を逆行して戻る
                if (mainLastSeg && currentAbsPoint > mainLastPoint) {
                    for (let i = events.length - 1; i >= 0; i--) {
                        let ev = events[i];
                        if (ev.type === 'main_seg') {
                            if (ev.point <= currentAbsPoint && ev.point > mainLastPoint) {
                                newSeg.push({ beat: [...ev.beat], x: ev.x });
                            }
                        }
                    }
                }

                // 最後に「幹の終点(蓋)」を配置する
                if (mainLastSeg) {
                    newSeg.push({ beat: [...mainLastSeg.beat], x: mainLastSeg.x });
                }

                // 重複バグ修復パトロール
                let fixCount = fixDuplicateSegs(newSeg);
                mainSlide.seg = newSeg;
                
                for (let i = 0; i < branches.length; i++) {
                    allDeletedNotes.add(branches[i]);
                }
                
                totalJoinedCount += targetSlides.length;
                
                if (targetSlides.length === 1) {
                    let fixMsg = fixCount > 0 ? ` (重複バグ ${fixCount}箇所を自動修復✨)` : " (重複なし)";
                    resultLogs.push(`<span style="color:#17a2b8;">ℹ️ 範囲 ${range.index}: 1個のみ検知されたため、バグ修復のみ実行しました${fixMsg}</span>`);
                } else {
                    let fixMsg = fixCount > 0 ? ` (重複バグ ${fixCount}箇所を自動修復✨)` : "";
                    resultLogs.push(`<span style="color:#28a745;">✅ 範囲 ${range.index}: ${targetSlides.length}個を結合しました${fixMsg}</span>`);
                }
            }

            if (totalJoinedCount === 0) {
                msgDiv.style.color = "#d32f2f";
                return msgDiv.innerHTML = "指定された範囲内に結合可能なスライドが一つも見つかりませんでした。";
            }

            data.note = notes.filter(n => !allDeletedNotes.has(n));

            const outJson = JSON.stringify(data); 
            const blob = new Blob([outJson], { type: "application/octet-stream" });
            const url = URL.createObjectURL(blob);
            
            dlLink.href = url;
            let originalName = file.name;
            let dotIndex = originalName.lastIndexOf('.');
            if(dotIndex !== -1) { originalName = originalName.substring(0, dotIndex); }
            dlLink.download = originalName + "_joined.mc";
            
            dlLink.style.display = "block";
            
            msgDiv.innerHTML = `<b>【処理結果】合計 ${totalJoinedCount}個 のスライドを処理しました！</b><br><br>` + resultLogs.join("<br>");

        } catch (err) {
            console.error(err);
            msgDiv.style.color = "#d32f2f";
            msgDiv.innerHTML = "ファイルの解析に失敗しました。";
        }
    };
    reader.readAsText(file);
}
</script>

</body>
</html>
