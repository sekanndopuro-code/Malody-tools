<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>敷スライド保管ツール (モバイル対応版)</title>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f0f2f5; color: #333; line-height: 1.5; }
        .container { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 550px; margin: auto; }
        h1 { font-size: 1.3em; text-align: center; margin-bottom: 15px; color: #222; }
        .desc { font-size: 0.8em; color: #555; margin-bottom: 15px; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; }
        input[type="text"], input[type="file"], textarea { width: 100%; padding: 12px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 8px; font-size: 1em; }
        textarea { height: 100px; font-family: monospace; font-size: 0.8em; }

        .radio-group { background: #e3f2fd; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #bbdefb; }
        .radio-group label { display: block; margin-bottom: 8px; cursor: pointer; }
        
        .range-group { background: #f9f9f9; border: 2px solid #e2e8f0; border-radius: 10px; padding: 12px; margin-bottom: 12px; }
        .range-group h4 { margin: 0 0 10px 0; font-size: 1em; color: #4a5568; }
        
        button { padding: 12px; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1em; width: 100%; font-weight: bold; margin-top: 5px; }
        .btn-add { background: #17a2b8; margin-bottom: 15px; }
        .btn-remove { background: #dc3545; width: auto; float: right; padding: 6px 12px; font-size: 0.85em; }
        .btn-export { background: #007bff; font-size: 1.1em; padding: 15px; }
        .btn-restore { background: #ff9800; font-size: 1.1em; padding: 15px; }
        .btn-copy { background: #6c757d; }
        
        .file-list { background: #fff; border: 1px dashed #bbb; padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 0.85em; }
        .file-item { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid #eee; }
        .file-item:last-child { border-bottom: none; }

        .dl-link { display: none; margin-top: 15px; text-align: center; padding: 15px; background: #28a745; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; }
        .dl-link.secondary { background: #e91e63; }
        
        #resultMsg { margin-top: 15px; font-size: 0.9em; font-weight: bold; }
        .note { font-size: 0.75em; color: #666; margin-top: 4px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h1>🛡️ 敷スライド保管ツール</h1>
    
    <div class="form-group">
        <label>📁 対象の .mcファイルを選択</label>
        <input type="file" id="mcFile" accept=".mc">
    </div>

    <div class="radio-group">
        <label><input type="radio" name="toolMode" value="export" checked onchange="switchMode()"> <b>💾 保管モード (Export)</b></label>
        <label><input type="radio" name="toolMode" value="restore" onchange="switchMode()"> <b>🛠️ 復元モード (Restore)</b></label>
    </div>

    <div id="exportSection">
        <div id="rangesContainer">
            <div class="range-group" id="range-0">
                <h4>範囲 1</h4>
                <div class="form-group"><label>始点Beat</label><input type="text" class="startBeat" placeholder="例: 10,0,1"></div>
                <div class="form-group"><label>終点Beat</label><input type="text" class="endBeat" placeholder="例: 15,0,0"></div>
                <button class="btn-remove" onclick="removeRange('range-0')">🗑️ 削除</button><div style="clear:both"></div>
            </div>
        </div>
        <button class="btn-add" onclick="addRange()">➕ 範囲を追加</button>
        <button class="btn-export" onclick="exportData()">💾 保管データを生成</button>

        <div id="exportResult" style="display:none; margin-top: 20px;">
            <label>📋 抽出されたデータ (これをコピーして保存も可)</label>
            <textarea id="exportText" readonly></textarea>
            <button class="btn-copy" onclick="copyExportText()">📋 テキストをコピー</button>
            <a id="dlExportTxtLink" class="dl-link" href="#">💾 _backup.txt を保存</a>
            <a id="dlExportMcLink" class="dl-link secondary" href="#">💾 軽量化した .mc を保存</a>
        </div>
    </div>

    <div id="restoreSection" style="display:none;">
        <div style="background: #fff3e0; padding: 15px; border-radius: 10px; border: 1px solid #ffe0b2;">
            <label style="color: #e65100;">📝 保管データを入力 (どちらでもOK)</label>
            
            <p style="font-size:0.8em; margin: 5px 0;"><b>方法A：ファイルを1つずつ追加</b></p>
            <div class="file-list" id="selectedFilesList">選択されたファイルなし</div>
            <input type="file" id="txtFileAdd" accept=".txt,.json" onchange="handleFileSelect(this)">
            <span class="note">※1枚選ぶごとにリストに追加されます。</span>

            <p style="font-size:0.8em; margin: 15px 0 5px 0;"><b>方法B：テキストを直接貼り付け</b></p>
            <textarea id="pasteArea" placeholder="ここに _backup.txt の中身を貼り付けてください。複数ある場合は続けて貼り付けてOK！"></textarea>
            <span class="note">※ファイルから中身をコピーしてここにペーストしてください。</span>
        </div>
        
        <button class="btn-restore" onclick="restoreData()" style="margin-top:20px;">🛠️ 復元を実行</button>
        <a id="dlRestoreLink" class="dl-link" href="#">💾 復元済み .mc を保存</a>
    </div>

    <div id="resultMsg"></div>
</div>

<script>
let rangeIdCounter = 1;
let restoreFiles = []; // 復元用ファイルリスト

function switchMode() {
    const mode = document.querySelector('input[name="toolMode"]:checked').value;
    document.getElementById("exportSection").style.display = (mode === "export" ? "block" : "none");
    document.getElementById("restoreSection").style.display = (mode === "restore" ? "block" : "none");
    document.getElementById("resultMsg").innerHTML = "";
}

function addRange() {
    const id = "range-" + rangeIdCounter++;
    const html = `<div class="range-group" id="${id}"><h4>範囲指定</h4><div class="form-group"><label>始点Beat</label><input type="text" class="startBeat" placeholder="例: 10,0,1"></div><div class="form-group"><label>終点Beat</label><input type="text" class="endBeat" placeholder="例: 15,0,0"></div><button class="btn-remove" onclick="removeRange('${id}')">🗑️ 削除</button><div style="clear:both"></div></div>`;
    document.getElementById("rangesContainer").insertAdjacentHTML('beforeend', html);
}

function removeRange(id) {
    if (document.querySelectorAll('.range-group').length > 1) document.getElementById(id).remove();
}

function handleFileSelect(input) {
    if (input.files.length > 0) {
        restoreFiles.push(input.files[0]);
        updateFileList();
        input.value = ""; // 同じファイルを再度選べるようにリセット
    }
}

function updateFileList() {
    const list = document.getElementById("selectedFilesList");
    if (restoreFiles.length === 0) {
        list.innerHTML = "選択されたファイルなし";
        return;
    }
    list.innerHTML = restoreFiles.map((f, i) => `
        <div class="file-item">
            <span>📄 ${f.name}</span>
            <button onclick="removeRestoreFile(${i})" style="width:auto; background:#999; padding:2px 8px; font-size:0.7em;">取消</button>
        </div>
    `).join('');
}

function removeRestoreFile(index) {
    restoreFiles.splice(index, 1);
    updateFileList();
}

function safeBeat(beat) { return (!beat || !Array.isArray(beat) || beat.length < 3) ? [0,0,1] : [beat[0], beat[1], beat[2] === 0 ? 1 : beat[2]]; }
function beatToPoint(beat) { let b = safeBeat(beat); return b[0] + (b[1] / b[2]); }
function parseBeat(str) {
    str = str.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));
    const parts = str.match(/-?\d+/g);
    return (parts && parts.length >= 3) ? [Number(parts[0]), Number(parts[1]), Number(parts[2])] : null;
}

// 保管モード
function exportData() {
    const mcFileInput = document.getElementById("mcFile");
    const msgDiv = document.getElementById("resultMsg");
    if (!mcFileInput.files.length) return alert("まずは .mcファイルを選択してください");

    const ranges = Array.from(document.querySelectorAll('.range-group')).map(g => {
        const s = parseBeat(g.querySelector('.startBeat').value);
        const e = parseBeat(g.querySelector('.endBeat').value);
        return (s && e) ? { min: Math.min(beatToPoint(s), beatToPoint(e)), max: Math.max(beatToPoint(s), beatToPoint(e)) } : null;
    });

    if (ranges.includes(null)) return alert("Beatの入力形式が正しくありません (例: 10,0,1)");

    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const data = JSON.parse(e.target.result.replace(/^\uFEFF/, '').trim());
            const extracted = [];
            const remaining = data.note.filter(n => {
                if (n.seg) {
                    const p = beatToPoint(n.beat);
                    if (ranges.some(r => p >= r.min - 0.001 && p <= r.max + 0.001)) {
                        extracted.push(n);
                        return false;
                    }
                }
                return true;
            });

            if (extracted.length === 0) return alert("指定範囲にスライドが見つかりませんでした。");

            const outTxt = JSON.stringify(extracted);
            document.getElementById("exportText").value = outTxt;
            document.getElementById("exportResult").style.display = "block";

            const name = mcFileInput.files[0].name.replace(".mc", "");
            setupDL("dlExportTxtLink", outTxt, name + "_backup.txt");
            data.note = remaining;
            setupDL("dlExportMcLink", JSON.stringify(data), name + "_light.mc");

            msgDiv.style.color = "#28a745";
            msgDiv.innerHTML = `✅ ${extracted.length} 個のスライドを保管しました！`;
        } catch(err) { alert("解析失敗: " + err); }
    };
    reader.readAsText(mcFileInput.files[0]);
}

function setupDL(id, content, filename) {
    const el = document.getElementById(id);
    const blob = new Blob([content], { type: "text/plain" });
    el.href = URL.createObjectURL(blob);
    el.download = filename;
    el.style.display = "block";
}

function copyExportText() {
    const area = document.getElementById("exportText");
    area.select();
    document.execCommand("copy");
    alert("コピーしました！");
}

// 復元モード
async function restoreData() {
    const mcFileInput = document.getElementById("mcFile");
    const pasteArea = document.getElementById("pasteArea");
    const msgDiv = document.getElementById("resultMsg");
    const dlLink = document.getElementById("dlRestoreLink");

    if (!mcFileInput.files.length) return alert("復元先の .mcファイルを選択してください");
    if (restoreFiles.length === 0 && !pasteArea.value.trim()) return alert("保管データ（ファイルまたは貼り付け）を入力してください");

    const readFile = (file) => new Promise(res => { const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsText(file); });

    try {
        let allNotes = [];
        // ファイルから読み込み
        for (let f of restoreFiles) {
            const txt = await readFile(f);
            allNotes = allNotes.concat(JSON.parse(txt.trim()));
        }
        // 貼り付けエリアから読み込み
        if (pasteArea.value.trim()) {
            // 複数の配列が並んでいても強引に結合して解析する
            const raw = pasteArea.value.trim();
            const formatted = "[" + raw.replace(/\]\s*\[/g, "],[") + "]";
            const pasted = JSON.parse(formatted).flat();
            allNotes = allNotes.concat(pasted);
        }

        const mcStr = await readFile(mcFileInput.files[0]);
        const data = JSON.parse(mcStr.replace(/^\uFEFF/, '').trim());

        let restoredCount = 0;
        for (let sn of allNotes) {
            const sp = beatToPoint(sn.beat);
            data.note = data.note.filter(n => !(n.seg && Math.abs(beatToPoint(n.beat) - sp) < 1e-4 && n.x === sn.x));
            data.note.push(sn);
            restoredCount++;
        }

        data.note.sort((a, b) => beatToPoint(a.beat) - beatToPoint(b.beat));
        
        setupDL("dlRestoreLink", JSON.stringify(data), mcFileInput.files[0].name.replace(".mc", "") + "_restored.mc");
        msgDiv.style.color = "#e65100";
        msgDiv.innerHTML = `🛠️ 復元完了！計 ${restoredCount} 個のスライドを挿入しました。`;
    } catch(err) { 
        console.error(err);
        alert("復元に失敗しました。データの形式を確認してください。"); 
    }
}
</script>
</body>
</html>
