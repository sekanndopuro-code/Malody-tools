<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>敷スライド保管ツール</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; color: #333; }
        .container { background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 550px; margin: auto; }
        h1 { font-size: 1.4em; text-align: center; margin-bottom: 20px; color: #222; }
        .desc { font-size: 0.85em; color: #555; margin-top: -10px; margin-bottom: 20px; line-height: 1.4; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; }
        input[type="text"], input[type="file"] { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 1em; }
        
        .radio-group { background: #e3f2fd; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #bbdefb; }
        .radio-group label { display: block; margin-bottom: 10px; cursor: pointer; font-weight: normal; }
        .radio-group label:last-child { margin-bottom: 0; }
        
        .range-group { background: #f9f9f9; border: 2px solid #e2e8f0; border-radius: 8px; padding: 15px; margin-bottom: 15px; position: relative; }
        .range-group h4 { margin-top: 0; margin-bottom: 15px; font-size: 1.1em; color: #4a5568; border-bottom: 2px solid #e2e8f0; padding-bottom: 5px; }
        .note { font-size: 0.8em; color: #666; margin-top: 5px; display: block; line-height: 1.4; }
        
        button { padding: 12px 20px; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1em; width: 100%; font-weight: bold; transition: 0.2s; margin-top: 10px; }
        .btn-add { background: #17a2b8; margin-bottom: 20px; }
        .btn-add:hover { background: #138496; }
        .btn-remove { background: #dc3545; padding: 8px 15px; margin-top: 5px; font-size: 0.9em; width: auto; float: right; }
        .btn-remove:hover { background: #c82333; }
        .btn-export { background: #007bff; font-size: 1.1em; padding: 15px; box-shadow: 0 4px 6px rgba(0, 123, 255, 0.3); }
        .btn-export:hover { background: #0056b3; }
        .btn-restore { background: #ff9800; font-size: 1.1em; padding: 15px; box-shadow: 0 4px 6px rgba(255, 152, 0, 0.3); color: #fff; }
        .btn-restore:hover { background: #e65100; }
        .btn-copy { background: #6c757d; margin-top: 5px; }
        .btn-copy:hover { background: #5a6268; }
        
        .clearfix::after { content: ""; clear: both; display: table; }
        .dl-link { display: none; margin-top: 15px; text-align: center; padding: 15px; background: #28a745; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; transition: 0.2s; box-shadow: 0 4px 6px rgba(40, 167, 69, 0.3); }
        .dl-link:hover { background: #218838; }
        .dl-link.secondary { background: #e91e63; box-shadow: 0 4px 6px rgba(233, 30, 99, 0.3); }
        .dl-link.secondary:hover { background: #c2185b; }
        
        #resultMsg { margin-top: 15px; font-size: 0.9em; font-weight: bold; line-height: 1.6; }
        textarea { width: 100%; height: 120px; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-family: monospace; font-size: 0.85em; resize: vertical; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🛡️ 敷スライド保管ツール</h1>
    <p class="desc">
        自動ソートによって破壊されてしまう「敷スライド(逆走スライド)」をテキストとして保管し、いつでも元の状態に復元できる命綱ツールです。<br>
        保管時に、<b>敷スライドを削除してエディタの動作を軽くしたmcファイル</b>も同時に出力できます。
    </p>
    
    <div class="form-group" style="margin-bottom: 20px;">
        <label>📁 対象の .mcファイルを選択</label>
        <span class="note" style="margin-top: -3px; margin-bottom: 8px;">保管モードなら「元の譜面」、復元モードなら「壊れた/軽量化された譜面」を選択します。</span>
        <input type="file" id="mcFile" accept="*/*">
    </div>

    <!-- モード切り替え -->
    <div class="radio-group">
        <label style="font-weight: bold; margin-bottom: 10px; color: #0d47a1;">⚙️ モード選択</label>
        <label>
            <input type="radio" name="toolMode" value="export" checked onchange="switchMode()"> <b>💾 保管モード (Export)</b>
            <span style="font-size:0.85em; color:#666; margin-left:25px; display:block;">指定範囲内のスライドを抽出し、復元用テキスト(.txt)と軽量化された(.mc)を作ります。</span>
        </label>
        <label style="margin-top: 5px;">
            <input type="radio" name="toolMode" value="restore" onchange="switchMode()"> <b>🛠️ 復元モード (Restore)</b>
            <span style="font-size:0.85em; color:#666; margin-left:25px; display:block;">壊れたmcファイルと、保管したtxtファイルの<b>2つを読み込ませて</b>完全修復します。</span>
        </label>
    </div>

    <!-- 保管モード (Export) のUI -->
    <div id="exportSection">
        <div id="rangesContainer">
            <div class="range-group clearfix" id="range-0">
                <h4>範囲 1</h4>
                <div class="form-group">
                    <label>始点Beat</label>
                    <input type="text" class="startBeat" placeholder="例: 10, 0, 1">
                </div>
                <div class="form-group">
                    <label>終点Beat</label>
                    <input type="text" class="endBeat" placeholder="例: 15, 0, 0">
                </div>
                <button type="button" class="btn-remove" onclick="removeRange('range-0')">🗑️ 削除</button>
            </div>
        </div>
        <button type="button" class="btn-add" onclick="addRange()">➕ 選択範囲を追加する</button>
        <button type="button" class="btn-export" onclick="exportData()">💾 保管データを生成</button>

        <div id="exportResult" style="display:none; margin-top: 20px;">
            <label style="color: #007bff;">📋 抽出された保管データ (確認用)</label>
            <textarea id="exportText" readonly></textarea>
            <button type="button" class="btn-copy" onclick="copyExportText()">📋 テキストをコピー</button>
            <a id="dlExportTxtLink" class="dl-link" href="#">💾 保管データ (.txt) をダウンロード</a>
            <a id="dlExportMcLink" class="dl-link secondary" href="#">💾 敷スライドを削除した軽量譜面 (.mc) をダウンロード</a>
        </div>
    </div>

    <!-- 復元モード (Restore) のUI -->
    <div id="restoreSection" style="display:none;">
        <div class="form-group" style="background: #fff3e0; padding: 15px; border-radius: 8px; border: 1px solid #ffe0b2; margin-bottom: 20px;">
            <label style="color: #e65100;">📁 保存しておいた保管データ (.txt) を選択</label>
            <input type="file" id="txtFile" accept=".txt,.json">
            <span class="note">保管モードで出力・保存しておいた <code>_backup.txt</code> ファイルを選択してください。</span>
        </div>
        <button type="button" class="btn-restore" onclick="restoreData()">🛠️ 復元を実行</button>
        <a id="dlRestoreLink" class="dl-link" href="#">💾 復元済みファイルをダウンロード</a>
    </div>

    <div id="resultMsg"></div>
</div>

<script>
let rangeIdCounter = 1;

function switchMode() {
    const mode = document.querySelector('input[name="toolMode"]:checked').value;
    document.getElementById("resultMsg").innerHTML = "";
    if (mode === "export") {
        document.getElementById("exportSection").style.display = "block";
        document.getElementById("restoreSection").style.display = "none";
    } else {
        document.getElementById("exportSection").style.display = "none";
        document.getElementById("restoreSection").style.display = "block";
    }
}

function addRange() {
    const container = document.getElementById("rangesContainer");
    const id = "range-" + rangeIdCounter++;
    const html = `
    <div class="range-group clearfix" id="${id}">
        <h4>範囲指定</h4>
        <div class="form-group">
            <label>始点Beat</label>
            <input type="text" class="startBeat" placeholder="例: 10, 0, 1">
        </div>
        <div class="form-group">
            <label>終点Beat</label>
            <input type="text" class="endBeat" placeholder="例: 15, 0, 0">
        </div>
        <button type="button" class="btn-remove" onclick="removeRange('${id}')">🗑️ 削除</button>
    </div>
    `;
    container.insertAdjacentHTML('beforeend', html);
    updateRangeLabels();
}

function removeRange(id) {
    const container = document.getElementById("rangesContainer");
    if (container.children.length <= 1) {
        alert("最低でも1つの範囲指定が必要です！");
        return;
    }
    document.getElementById(id).remove();
    updateRangeLabels();
}

function updateRangeLabels() {
    const groups = document.querySelectorAll('.range-group h4');
    groups.forEach((el, index) => {
        el.innerText = `範囲 ${index + 1}`;
    });
}

function safeBeat(beat) {
    if (!beat || !Array.isArray(beat) || beat.length < 3) return[0, 0, 1];
    return [beat[0], beat[1], beat[2] === 0 ? 1 : beat[2]];
}

function beatToPoint(beat) {
    let b = safeBeat(beat);
    return b[0] + (b[1] / b[2]);
}

function parseBeat(str) {
    if (!str) return null;
    str = str.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));
    const parts = str.match(/-?\d+/g);
    if (parts && parts.length >= 3) {
        return[Number(parts[0]), Number(parts[1]), Number(parts[2])];
    }
    return null;
}

// ==========================================
// 保管モード (Export)
// ==========================================
function exportData() {
    const fileInput = document.getElementById("mcFile");
    const msgDiv = document.getElementById("resultMsg");
    const exportResult = document.getElementById("exportResult");
    const txtLink = document.getElementById("dlExportTxtLink");
    const mcLink = document.getElementById("dlExportMcLink");
    
    msgDiv.innerHTML = "";
    exportResult.style.display = "none";
    txtLink.style.display = "none";
    mcLink.style.display = "none";

    if (!fileInput.files.length) {
        msgDiv.style.color = "#d32f2f";
        return msgDiv.innerHTML = "一番上の「.mcファイル」を選択してください。";
    }

    const rangeGroups = document.querySelectorAll('.range-group');
    const ranges =[];
    for (let i = 0; i < rangeGroups.length; i++) {
        const startStr = rangeGroups[i].querySelector('.startBeat').value;
        const endStr = rangeGroups[i].querySelector('.endBeat').value;
        const startBeat = parseBeat(startStr);
        const endBeat = parseBeat(endStr);
        if (!startBeat || !endBeat) {
            msgDiv.style.color = "#d32f2f";
            return msgDiv.innerHTML = `⚠️ 範囲 ${i + 1} のBeatフォーマットが正しくありません。`;
        }
        const startPoint = beatToPoint(startBeat);
        const endPoint = beatToPoint(endBeat);
        ranges.push({ min: Math.min(startPoint, endPoint), max: Math.max(startPoint, endPoint) });
    }

    const file = fileInput.files[0];
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            let cleanStr = e.target.result.replace(/^\uFEFF/, '').trim();
            const data = JSON.parse(cleanStr);
            if (!data.note) throw new Error("note配列が存在しません。");

            const extractedNotes =[];
            const notesToDelete = new Set();

            for (let note of data.note) {
                if (note.seg && Array.isArray(note.seg)) {
                    const point = beatToPoint(safeBeat(note.beat));
                    let inRange = false;
                    for (let r of ranges) {
                        if (point >= r.min - 0.001 && point <= r.max + 0.001) {
                            inRange = true; break;
                        }
                    }
                    if (inRange) {
                        extractedNotes.push(JSON.parse(JSON.stringify(note)));
                        notesToDelete.add(note);
                    }
                }
            }

            if (extractedNotes.length === 0) {
                msgDiv.style.color = "#d32f2f";
                return msgDiv.innerHTML = "指定範囲内に保管するスライドが見つかりませんでした。";
            }

            // 1. JSONテキスト化 (.txt 用)
            const outText = JSON.stringify(extractedNotes);
            document.getElementById("exportText").value = outText;
            exportResult.style.display = "block";

            const blobTxt = new Blob([outText], { type: "text/plain" });
            txtLink.href = URL.createObjectURL(blobTxt);
            let originalName = file.name.replace(/\.[^/.]+$/, "");
            txtLink.download = originalName + "_backup.txt";
            txtLink.style.display = "block";

            // 2. 敷スライドを削除した .mc データを生成
            data.note = data.note.filter(n => !notesToDelete.has(n));
            const outMcStr = JSON.stringify(data);
            const blobMc = new Blob([outMcStr], { type: "application/octet-stream" });
            mcLink.href = URL.createObjectURL(blobMc);
            mcLink.download = originalName + "_light.mc";
            mcLink.style.display = "block";

            msgDiv.style.color = "#28a745";
            msgDiv.innerHTML = `✅ ${extractedNotes.length} 個のスライドを抽出し、保管データを作成しました！<br>
            <span style="font-weight:normal; font-size:0.9em;">下のピンク色のボタンから軽量化したmcファイルをダウンロードして作業を続けてください。</span>`;

        } catch (err) {
            console.error(err);
            msgDiv.style.color = "#d32f2f";
            msgDiv.innerHTML = "ファイルの解析に失敗しました。";
        }
    };
    reader.readAsText(file);
}

function copyExportText() {
    const text = document.getElementById("exportText");
    text.select();
    navigator.clipboard.writeText(text.value).then(() => {
        alert("クリップボードにコピーしました！");
    }).catch(() => {
        alert("コピーに失敗しました。");
    });
}

// ==========================================
// 復元モード (Restore) - Wファイル非同期読み込み
// ==========================================
async function restoreData() {
    const mcFileInput = document.getElementById("mcFile");
    const txtFileInput = document.getElementById("txtFile");
    const msgDiv = document.getElementById("resultMsg");
    const dlLink = document.getElementById("dlRestoreLink");
    
    msgDiv.innerHTML = "";
    dlLink.style.display = "none";

    if (!mcFileInput.files.length) {
        msgDiv.style.color = "#d32f2f";
        return msgDiv.innerHTML = "一番上の「対象の.mcファイル」を選択してください。";
    }
    if (!txtFileInput.files.length) {
        msgDiv.style.color = "#d32f2f";
        return msgDiv.innerHTML = "オレンジ枠の「保管データ(.txt)」を選択してください。";
    }

    // ファイルを非同期で読み込む関数
    const readFileAsync = (file) => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result);
        reader.onerror = reject;
        reader.readAsText(file);
    });

    try {
        // .txtファイルの読み込みと解析
        const txtStr = await readFileAsync(txtFileInput.files[0]);
        let savedNotes;
        try {
            savedNotes = JSON.parse(txtStr.trim());
            if (!Array.isArray(savedNotes)) throw new Error("配列ではありません");
        } catch(e) {
            msgDiv.style.color = "#d32f2f";
            return msgDiv.innerHTML = "保管データの形式が正しくありません。正しい .txt ファイルを選択してください。";
        }

        // .mcファイルの読み込みと解析
        const mcStr = await readFileAsync(mcFileInput.files[0]);
        let cleanStr = mcStr.replace(/^\uFEFF/, '').trim();
        const data = JSON.parse(cleanStr);
        
        if (!data.note) throw new Error("note配列が存在しません。");

        let deletedNotes = new Set();
        let restoredCount = 0;

        for (let sn of savedNotes) {
            let sPoint = beatToPoint(safeBeat(sn.beat));
            let sX = sn.x;

            // mcファイルの中から「始点のタイミングとX座標が一致する壊れたスライド」を探し出して削除予定リストへ
            for (let n of data.note) {
                if (n.seg && !deletedNotes.has(n)) {
                    if (Math.abs(beatToPoint(safeBeat(n.beat)) - sPoint) < 1e-4 && n.x === sX) {
                        deletedNotes.add(n);
                    }
                }
            }
            // 保管してあった無傷のノーツを追加
            data.note.push(sn);
            restoredCount++;
        }

        // 壊れたノーツを除外する
        data.note = data.note.filter(n => !deletedNotes.has(n));

        // 時間順にソートし直す
        data.note.sort((a, b) => beatToPoint(safeBeat(a.beat)) - beatToPoint(safeBeat(b.beat)));

        const outJson = JSON.stringify(data);
        const blob = new Blob([outJson], { type: "application/octet-stream" });
        const url = URL.createObjectURL(blob);
        
        dlLink.href = url;
        let originalName = mcFileInput.files[0].name.replace(/\.[^/.]+$/, "");
        dlLink.download = originalName + "_restored.mc";
        dlLink.style.display = "block";

        msgDiv.style.color = "#e65100";
        msgDiv.innerHTML = `<b>🛠️ 復元完了！ ${restoredCount} 個の敷スライドを譜面に挿入しました！</b><br>
        <span style="font-weight:normal; font-size:0.9em;">元の場所にあった壊れたスライドは自動で削除されています。</span>`;

    } catch (err) {
        console.error(err);
        msgDiv.style.color = "#d32f2f";
        msgDiv.innerHTML = "ファイルの解析に失敗しました。データが破損している可能性があります。";
    }
}
</script>

</body>
</html>
