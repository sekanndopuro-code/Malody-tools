<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイナス結合ツール</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; color: #333; }
        .container { background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        h1 { font-size: 1.4em; text-align: center; margin-bottom: 20px; color: #222; }
        .desc { font-size: 0.85em; color: #555; margin-top: -10px; margin-bottom: 20px; line-height: 1.4; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; }
        input[type="text"], input[type="file"] { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 1em; }
        
        .range-pair { background: #f9f9f9; border: 2px solid #e2e8f0; border-radius: 8px; padding: 15px; margin-bottom: 20px; position: relative; }
        .range-pair h4 { margin-top: 0; margin-bottom: 5px; font-size: 1.1em; color: #4a5568; border-bottom: 2px solid #e2e8f0; padding-bottom: 5px; }
        .note { font-size: 0.8em; color: #d32f2f; margin-bottom: 10px; font-weight: bold; }
        
        .flex-container { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        .box-minus { flex: 1; min-width: 200px; padding: 10px; background: #e9ecef; border-radius: 6px; border: 1px solid #ced4da; }
        .box-plus { flex: 1; min-width: 200px; padding: 10px; background: #d4edda; border-radius: 6px; border: 1px solid #c3e6cb; }

        button { padding: 12px 20px; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1em; width: 100%; font-weight: bold; transition: 0.2s; }
        .btn-add { background: #17a2b8; margin-bottom: 20px; }
        .btn-add:hover { background: #138496; }
        .btn-remove { background: #dc3545; padding: 8px 15px; margin-top: 5px; font-size: 0.9em; width: auto; float: right; }
        .btn-remove:hover { background: #c82333; }
        .btn-process { background: #9c27b0; font-size: 1.1em; padding: 15px; box-shadow: 0 4px 6px rgba(156, 39, 176, 0.3); }
        .btn-process:hover { background: #7b1fa2; }
        
        .clearfix::after { content: ""; clear: both; display: table; }
        #dlLink { display: none; margin-top: 20px; text-align: center; padding: 15px; background: #007bff; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; transition: 0.2s; box-shadow: 0 4px 6px rgba(0, 123, 255, 0.3); }
        #dlLink:hover { background: #0056b3; }
        #resultMsg { margin-top: 15px; font-size: 0.95em; font-weight: bold; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <h1>⏪ マイナス結合ツール</h1>
    <p class="desc">
        <b>プラス枠</b>のスライドを基準(現在)とし、<b>マイナス枠</b>にある過去の装飾スライド群を「逆行→戻る」の往復ブロックにして一本に結合します。
    </p>
    
    <div class="form-group" style="margin-bottom: 20px;">
        <label>📁 .mcファイルを選択</label>
        <input type="file" id="mcFile" accept="*/*">
    </div>

    <div id="pairsContainer">
        <div class="range-pair clearfix" id="pair-0">
            <h4>結合セット 1</h4>
            <p class="note">※プラス枠にあるスライドは「一つ」にしてください。</p>
            <div class="flex-container">
                <div class="box-minus">
                    <label style="color: #495057;">➖ マイナス枠 (過去の装飾)</label>
                    <input type="text" class="m-startBeat" placeholder="始点 (例: 1, 0, 1)">
                    <input type="text" class="m-endBeat" placeholder="終点 (例: 5, 0, 0)" style="margin-top: 5px;">
                </div>
                <div class="box-plus">
                    <label style="color: #155724;">➕ プラス枠 (基準メイン)</label>
                    <input type="text" class="p-startBeat" placeholder="始点 (例: 10, 0, 0)">
                    <input type="text" class="p-endBeat" placeholder="終点 (例: 12, 0, 0)" style="margin-top: 5px;">
                </div>
            </div>
            <button type="button" class="btn-remove" onclick="removePair('pair-0')">🗑️ 削除</button>
        </div>
    </div>

    <button type="button" class="btn-add" onclick="addPair()">➕ 結合セットを追加する</button>
    <button type="button" class="btn-process" onclick="processMC()">⏪ マイナス結合を実行</button>

    <div id="resultMsg"></div>
    <a id="dlLink" href="#">💾 結合済みファイルをダウンロード</a>
</div>

<script>
let pairIdCounter = 1;

function addPair() {
    const container = document.getElementById("pairsContainer");
    const id = "pair-" + pairIdCounter++;
    const html = `
    <div class="range-pair clearfix" id="${id}">
        <h4>結合セット</h4>
        <p class="note">※プラス枠にあるスライドは「一つ」にしてください。</p>
        <div class="flex-container">
            <div class="box-minus">
                <label style="color: #495057;">➖ マイナス枠 (過去の装飾)</label>
                <input type="text" class="m-startBeat" placeholder="始点 (例: 1, 0, 1)">
                <input type="text" class="m-endBeat" placeholder="終点 (例: 5, 0, 0)" style="margin-top: 5px;">
            </div>
            <div class="box-plus">
                <label style="color: #155724;">➕ プラス枠 (基準メイン)</label>
                <input type="text" class="p-startBeat" placeholder="始点 (例: 10, 0, 0)">
                <input type="text" class="p-endBeat" placeholder="終点 (例: 12, 0, 0)" style="margin-top: 5px;">
            </div>
        </div>
        <button type="button" class="btn-remove" onclick="removePair('${id}')">🗑️ 削除</button>
    </div>
    `;
    container.insertAdjacentHTML('beforeend', html);
    updatePairLabels();
}

function removePair(id) {
    const container = document.getElementById("pairsContainer");
    if (container.children.length <= 1) {
        alert("最低でも1つの結合セットが必要です！");
        return;
    }
    document.getElementById(id).remove();
    updatePairLabels();
}

function updatePairLabels() {
    const groups = document.querySelectorAll('.range-pair h4');
    groups.forEach((el, index) => {
        el.innerText = `結合セット ${index + 1}`;
    });
}

function beatToPoint(beat) {
    if (!beat || beat.length !== 3) return 0;
    if (beat[2] === 0) return beat[0];
    // 負の小節もそのまま足し算で処理
    return beat[0] + (beat[1] / beat[2]);
}

function parseBeat(str) {
    if (!str) return null;
    str = str.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));
    const parts = str.match(/-?\d+/g);
    if (parts && parts.length >= 3) {
        return [Number(parts[0]), Number(parts[1]), Number(parts[2])];
    }
    return null;
}

function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }

function beatAdd(beat1, beat2) {
    if (!beat1) return [...beat2];
    if (!beat2) return[...beat1];
    const m1 = beat1[0], n1 = beat1[1] || 0, d1 = beat1[2] === 0 ? 1 : (beat1[2] || 1);
    const m2 = beat2[0], n2 = beat2[1] || 0, d2 = beat2[2] === 0 ? 1 : (beat2[2] || 1);
    const num1 = n1 * d2;
    const num2 = n2 * d1;
    const den = d1 * d2;
    let num = num1 + num2;
    let m = m1 + m2 + Math.floor(num / den);
    let n = num % den;
    if (n === 0) return [m, 0, 0];
    const g = gcd(n, den);
    return[m, n / g, den / g];
}

// 負の相対時間を算出する関数 (targetBeat - baseBeat)
// 小節のみマイナス、分子分母は必ず正になるように正規化する
function beatDiffSigned(targetBeat, baseBeat) {
    const m1 = targetBeat[0], n1 = targetBeat[1] || 0, d1 = targetBeat[2] === 0 ? 1 : (targetBeat[2] || 1);
    const m2 = baseBeat[0], n2 = baseBeat[1] || 0, d2 = baseBeat[2] === 0 ? 1 : (baseBeat[2] || 1);
    
    const num1 = (m1 * d1 + n1) * d2;
    const num2 = (m2 * d2 + n2) * d1;
    const den = d1 * d2;
    
    const diffNum = num1 - num2;
    const m = Math.floor(diffNum / den);
    const n = diffNum - (m * den);
    
    if (n === 0) return [m, 0, 0];
    const g = gcd(n, den);
    return [m, n / g, den / g];
}

// 負のBeatにも対応した、重複バグ修復パトロール (1万分の1ずらし)
function fixDuplicateSegs(segArray) {
    let usedPoints =[];
    let fixedCount = 0;
    const MICRO_DEN = 10000; 
    
    function addMicroOffset(beat, offsetCount) {
        if (!beat || beat.length !== 3 || offsetCount === 0) return beat;
        const m = beat[0], n = beat[1] || 0, d = beat[2] === 0 ? 1 : beat[2];
        const num = (m * d + n) * MICRO_DEN + offsetCount * d;
        const den = d * MICRO_DEN;
        const newM = Math.floor(num / den);
        const newN = num - (newM * den);
        if (newN === 0) return[newM, 0, 0];
        const g = gcd(newN, den);
        return[newM, newN / g, den / g];
    }

    // メインの終点（判定位置）を守るため後ろから走査
    for (let i = segArray.length - 1; i >= 0; i--) {
        let segItem = segArray[i];
        let p = beatToPoint(segItem.beat);
        
        let conflictCount = 0;
        let currentP = p;
        
        while (true) {
            let isConflict = false;
            for (let j = 0; j < usedPoints.length; j++) {
                if (Math.abs(currentP - usedPoints[j]) < 1e-5) {
                    isConflict = true;
                    break;
                }
            }
            if (!isConflict) break;
            conflictCount++;
            currentP = p + (conflictCount / MICRO_DEN);
        }
        
        if (conflictCount > 0) {
            segItem.beat = addMicroOffset(segItem.beat, conflictCount);
            fixedCount++;
        }
        usedPoints.push(currentP);
    }
    return fixedCount;
}

function processMC() {
    const fileInput = document.getElementById("mcFile");
    const msgDiv = document.getElementById("resultMsg");
    const dlLink = document.getElementById("dlLink");
    
    msgDiv.innerHTML = "";
    msgDiv.style.color = "#333";
    dlLink.style.display = "none";

    if (!fileInput.files.length) {
        msgDiv.style.color = "#d32f2f";
        return msgDiv.innerHTML = "ファイルを選択してください。";
    }

    const pairGroups = document.querySelectorAll('.range-pair');
    const pairs =[];
    
    for (let i = 0; i < pairGroups.length; i++) {
        const mStartStr = pairGroups[i].querySelector('.m-startBeat').value;
        const mEndStr = pairGroups[i].querySelector('.m-endBeat').value;
        const pStartStr = pairGroups[i].querySelector('.p-startBeat').value;
        const pEndStr = pairGroups[i].querySelector('.p-endBeat').value;
        
        const mStartBeat = parseBeat(mStartStr);
        const mEndBeat = parseBeat(mEndStr);
        const pStartBeat = parseBeat(pStartStr);
        const pEndBeat = parseBeat(pEndStr);
        
        if (!mStartBeat || !mEndBeat || !pStartBeat || !pEndBeat) {
            msgDiv.style.color = "#d32f2f";
            return msgDiv.innerHTML = `⚠️ 結合セット ${i + 1} のBeatフォーマットが正しくありません。空欄がないか確認してください。`;
        }
        
        const mStartPoint = beatToPoint(mStartBeat);
        const mEndPoint = beatToPoint(mEndBeat);
        const pStartPoint = beatToPoint(pStartBeat);
        const pEndPoint = beatToPoint(pEndBeat);
        
        pairs.push({
            index: i + 1,
            mMin: Math.min(mStartPoint, mEndPoint),
            mMax: Math.max(mStartPoint, mEndPoint),
            pMin: Math.min(pStartPoint, pEndPoint),
            pMax: Math.max(pStartPoint, pEndPoint)
        });
    }

    const file = fileInput.files[0];
    const reader = new FileReader();
    
    reader.onload = function(e) {
        try {
            const data = JSON.parse(e.target.result);
            if (!data.note) {
                msgDiv.style.color = "#d32f2f";
                return msgDiv.innerHTML = "無効な譜面データです。";
            }

            const notes = data.note;
            let allDeletedNotes = new Set();
            let totalJoinedCount = 0;
            let resultLogs =[];

            for (let r = 0; r < pairs.length; r++) {
                const pair = pairs[r];
                const minusSlides =[];
                const plusSlides =[];

                // スライドをマイナス枠とプラス枠に振り分け
                for (let i = 0; i < notes.length; i++) {
                    const note = notes[i];
                    if (allDeletedNotes.has(note)) continue;

                    if (note.seg && Array.isArray(note.seg)) {
                        const point = beatToPoint(note.beat);
                        if (point >= pair.mMin - 0.001 && point <= pair.mMax + 0.001) {
                            minusSlides.push(note);
                        } else if (point >= pair.pMin - 0.001 && point <= pair.pMax + 0.001) {
                            plusSlides.push(note);
                        }
                    }
                }

                // エラーチェック（プラス枠が複数、またはマイナス枠が0個）
                if (plusSlides.length !== 1) {
                    resultLogs.push(`<span style="color:#d32f2f;">⚠️ 結合セット ${pair.index}: プラス枠のスライドが「${plusSlides.length}個」あります。1つに修正してください。</span>`);
                    continue;
                }
                if (minusSlides.length < 1) {
                    resultLogs.push(`<span style="color:#d32f2f;">⚠️ 結合セット ${pair.index}: マイナス枠の装飾スライドが見つかりません。</span>`);
                    continue;
                }

                // プラス枠のスライドを「メイン基準(0)」とする
                const mainSlide = plusSlides[0];
                const mainBeat = mainSlide.beat;
                const mainX = (typeof mainSlide.x === 'number') ? mainSlide.x : 0;

                // マイナス枠のスライドを、メインに近い時間(遅い順)にソートして処理
                minusSlides.sort((a, b) => beatToPoint(b.beat) - beatToPoint(a.beat));

                const newSeg =[];

                // マイナス装飾スライド群の「逆行→順走→戻る」処理
                for (let i = 0; i < minusSlides.length; i++) {
                    const branch = minusSlides[i];
                    const branchSegs = branch.seg ||[];
                    const branchX = (typeof branch.x === 'number') ? branch.x : 0;
                    
                    let absPoints =[ { beat: branch.beat, x: branchX } ];
                    for (let s of branchSegs) {
                        absPoints.push({ beat: beatAdd(branch.beat, s.beat), x: branchX + s.x });
                    }

                    // 【復路(逆行)】 基準点から、装飾の終点→始点へ遡る
                    for (let j = absPoints.length - 1; j >= 0; j--) {
                        let p = absPoints[j];
                        newSeg.push({
                            beat: beatDiffSigned(p.beat, mainBeat),
                            x: p.x - mainX
                        });
                    }

                    // 【往路(順行)】 装飾の始点から終点へ
                    for (let j = 1; j < absPoints.length; j++) {
                        let p = absPoints[j];
                        newSeg.push({
                            beat: beatDiffSigned(p.beat, mainBeat),
                            x: p.x - mainX
                        });
                    }

                    // 【帰還点】 基準点(0, 0)へ戻る
                    newSeg.push({ beat: [0,0,0], x: 0 });
                }

                // 最後にメイン幹の元々のseg(未来への進行)を追加
                if (mainSlide.seg) {
                    for (let s of mainSlide.seg) {
                        newSeg.push(JSON.parse(JSON.stringify(s)));
                    }
                }

                // 重複バグ修復パトロール
                let fixCount = fixDuplicateSegs(newSeg);
                mainSlide.seg = newSeg;
                
                for (let i = 0; i < minusSlides.length; i++) {
                    allDeletedNotes.add(minusSlides[i]);
                }
                
                totalJoinedCount += (1 + minusSlides.length);
                let fixMsg = fixCount > 0 ? ` (重複バグ ${fixCount}箇所を自動修復✨)` : "";
                resultLogs.push(`<span style="color:#28a745;">✅ 結合セット ${pair.index}: メイン1個 ＋ マイナス装飾${minusSlides.length}個を結合しました${fixMsg}</span>`);
            }

            if (totalJoinedCount === 0) {
                msgDiv.style.color = "#d32f2f";
                return msgDiv.innerHTML = "処理に成功した結合セットがありませんでした。";
            }

            data.note = notes.filter(n => !allDeletedNotes.has(n));

            const outJson = JSON.stringify(data); 
            const blob = new Blob([outJson], { type: "application/octet-stream" });
            const url = URL.createObjectURL(blob);
            
            dlLink.href = url;
            let originalName = file.name;
            let dotIndex = originalName.lastIndexOf('.');
            if(dotIndex !== -1) { originalName = originalName.substring(0, dotIndex); }
            dlLink.download = originalName + "_minus_joined.mc";
            
            dlLink.style.display = "block";
            
            msgDiv.innerHTML = `<b>【処理結果】合計 ${totalJoinedCount}個 のスライドを処理しました！</b><br><br>` + resultLogs.join("<br>");

        } catch (err) {
            console.error(err);
            msgDiv.style.color = "#d32f2f";
            msgDiv.innerHTML = "ファイルの解析に失敗しました。";
        }
    };
    reader.readAsText(file);
}
</script>

</body>
</html>
