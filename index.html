<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スライド結合ツール</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; color: #333; }
        .container { background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        h1 { font-size: 1.4em; text-align: center; margin-bottom: 20px; color: #222; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; }
        input[type="text"], input[type="file"] { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 1em; }
        .note { font-size: 0.8em; color: #666; margin-top: 5px; display: block; }
        
        /* 範囲指定ボックスのスタイル */
        .range-group { background: #f9f9f9; border: 2px solid #e2e8f0; border-radius: 8px; padding: 15px; margin-bottom: 15px; position: relative; }
        .range-group h4 { margin-top: 0; margin-bottom: 15px; font-size: 1.1em; color: #4a5568; border-bottom: 2px solid #e2e8f0; padding-bottom: 5px; }
        
        button { padding: 12px 20px; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1em; width: 100%; font-weight: bold; transition: 0.2s; }
        .btn-add { background: #17a2b8; margin-bottom: 20px; }
        .btn-add:hover { background: #138496; }
        .btn-remove { background: #dc3545; padding: 8px 15px; margin-top: 5px; font-size: 0.9em; width: auto; float: right; }
        .btn-remove:hover { background: #c82333; }
        .btn-process { background: #28a745; font-size: 1.1em; padding: 15px; box-shadow: 0 4px 6px rgba(40, 167, 69, 0.3); }
        .btn-process:hover { background: #218838; }
        
        /* 回り込み解除 */
        .clearfix::after { content: ""; clear: both; display: table; }

        #dlLink { display: none; margin-top: 20px; text-align: center; padding: 15px; background: #007bff; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; transition: 0.2s; box-shadow: 0 4px 6px rgba(0, 123, 255, 0.3); }
        #dlLink:hover { background: #0056b3; }
        #resultMsg { margin-top: 15px; font-size: 0.95em; font-weight: bold; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <h1>スライド結合ツール</h1>
    
    <div class="form-group" style="margin-bottom: 25px;">
        <label>📁 対象の .mcファイルを選択</label>
        <input type="file" id="mcFile" accept="*/*">
    </div>

    <!-- ここに範囲指定のボックスが追加されていく -->
    <div id="rangesContainer">
        <div class="range-group clearfix" id="range-0">
            <h4>範囲 1</h4>
            <div class="form-group">
                <label>始点Beat</label>
                <input type="text" class="startBeat" placeholder="例: 1, 0, 0">
            </div>
            <div class="form-group">
                <label>終点Beat</label>
                <input type="text" class="endBeat" placeholder="例: 3, 1, 2">
            </div>
            <button type="button" class="btn-remove" onclick="removeRange('range-0')">🗑️ 削除</button>
        </div>
    </div>

    <button type="button" class="btn-add" onclick="addRange()">選択範囲を追加する</button>
    <button type="button" class="btn-process" onclick="processMC()">結合処理を実行</button>

    <div id="resultMsg"></div>
    <a id="dlLink" href="#">💾 結合済みファイルをダウンロード</a>
</div>

<script>
let rangeIdCounter = 1;

// 範囲を追加する処理
function addRange() {
    const container = document.getElementById("rangesContainer");
    const id = "range-" + rangeIdCounter++;
    
    const html = `
    <div class="range-group clearfix" id="${id}">
        <h4>範囲指定</h4>
        <div class="form-group">
            <label>始点Beat</label>
            <input type="text" class="startBeat" placeholder="例: 23, 216, 288">
        </div>
        <div class="form-group">
            <label>終点Beat</label>
            <input type="text" class="endBeat" placeholder="例: 25, 72, 288">
        </div>
        <button type="button" class="btn-remove" onclick="removeRange('${id}')">🗑️ 削除</button>
    </div>
    `;
    container.insertAdjacentHTML('beforeend', html);
    updateRangeLabels();
}

// 範囲を削除する処理
function removeRange(id) {
    const container = document.getElementById("rangesContainer");
    if (container.children.length <= 1) {
        alert("最低でも1つの範囲指定が必要です！");
        return;
    }
    document.getElementById(id).remove();
    updateRangeLabels();
}

// 範囲1、範囲2…と表示を自動で振り直す処理
function updateRangeLabels() {
    const groups = document.querySelectorAll('.range-group h4');
    groups.forEach((el, index) => {
        el.innerText = `範囲 ${index + 1}`;
    });
}

// === 以下、計算用関数群 ===
function beatToPoint(beat) {
    if (!beat || beat.length !== 3) return 0;
    if (beat[2] === 0) return beat[0];
    return beat[0] + (beat[1] / beat[2]);
}

function parseBeat(str) {
    if (!str) return null;
    str = str.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));
    const parts = str.match(/-?\d+/g);
    if (parts && parts.length >= 3) {
        return [Number(parts[0]), Number(parts[1]), Number(parts[2])];
    }
    return null;
}

function gcd(a, b) {
    return b === 0 ? a : gcd(b, a % b);
}

function addOffsetToBeat(beat, offsetIndex) {
    if (!beat || beat.length !== 3 || offsetIndex === 0) return beat;
    const m = beat[0];
    const n = beat[1];
    const d = beat[2] === 0 ? 1 : beat[2];
    
    let newNum = n * 10000 + offsetIndex * d;
    let newDen = d * 10000;
    
    let extraM = Math.floor(newNum / newDen);
    let newM = m + extraM;
    newNum = newNum % newDen;
    
    if (newNum === 0) return [newM, 0, 0];
    
    let g = gcd(newNum, newDen);
    return[newM, newNum / g, newDen / g];
}

// === メイン処理 ===
function processMC() {
    const fileInput = document.getElementById("mcFile");
    const msgDiv = document.getElementById("resultMsg");
    const dlLink = document.getElementById("dlLink");
    
    msgDiv.innerHTML = "";
    msgDiv.style.color = "#333";
    dlLink.style.display = "none";

    if (!fileInput.files.length) {
        msgDiv.style.color = "#d32f2f";
        return msgDiv.innerHTML = "ファイルを選択してください。";
    }

    // 複数の範囲指定をすべて読み取る
    const rangeGroups = document.querySelectorAll('.range-group');
    const ranges =[];
    
    for (let i = 0; i < rangeGroups.length; i++) {
        const startStr = rangeGroups[i].querySelector('.startBeat').value;
        const endStr = rangeGroups[i].querySelector('.endBeat').value;
        const startBeat = parseBeat(startStr);
        const endBeat = parseBeat(endStr);
        
        if (!startBeat || !endBeat) {
            msgDiv.style.color = "#d32f2f";
            return msgDiv.innerHTML = `⚠️ 範囲 ${i + 1} のBeatフォーマットが正しくありません。<br>空欄がないか確認してください。`;
        }
        
        const startPoint = beatToPoint(startBeat);
        const endPoint = beatToPoint(endBeat);
        ranges.push({
            index: i + 1,
            min: Math.min(startPoint, endPoint),
            max: Math.max(startPoint, endPoint)
        });
    }

    const file = fileInput.files[0];
    const reader = new FileReader();
    
    reader.onload = function(e) {
        try {
            const data = JSON.parse(e.target.result);
            if (!data.note) {
                msgDiv.style.color = "#d32f2f";
                return msgDiv.innerHTML = "無効な譜面データです。";
            }

            const notes = data.note;
            let allDeletedNotes = new Set();
            let totalJoinedCount = 0;
            let resultLogs =[];

            // 各範囲ごとに処理を行う
            for (let r = 0; r < ranges.length; r++) {
                const range = ranges[r];
                const targetSlides =[];

                // この範囲に当てはまるスライドを探す
                for (let i = 0; i < notes.length; i++) {
                    const note = notes[i];
                    if (allDeletedNotes.has(note)) continue; // すでに別の範囲で結合対象になったものは無視

                    if (note.seg && Array.isArray(note.seg)) {
                        const point = beatToPoint(note.beat);
                        if (point >= range.min - 0.001 && point <= range.max + 0.001) {
                            targetSlides.push(note);
                        }
                    }
                }

                if (targetSlides.length < 2) {
                    resultLogs.push(`<span style="color:#d32f2f;">⚠️ 範囲 ${range.index}: 対象が2つ未満のためスキップ</span>`);
                    continue;
                }

                // スライドをソートして結合
                targetSlides.sort((a, b) => beatToPoint(a.beat) - beatToPoint(b.beat));
                const mainSlide = targetSlides[0];
                const newSeg =[];

                for (let i = 0; i < targetSlides.length; i++) {
                    const slide = targetSlides[i];
                    const segs = slide.seg;
                    
                    if (i % 2 === 0) {
                        for (let j = 0; j < segs.length; j++) {
                            let segItem = JSON.parse(JSON.stringify(segs[j]));
                            segItem.beat = addOffsetToBeat(segItem.beat, i);
                            newSeg.push(segItem);
                        }
                    } else {
                        for (let j = segs.length - 1; j >= 0; j--) {
                            let segItem = JSON.parse(JSON.stringify(segs[j]));
                            segItem.beat = addOffsetToBeat(segItem.beat, i);
                            newSeg.push(segItem);
                        }
                        let zeroItem = { "beat": [0, 0, 0], "x": 0 };
                        zeroItem.beat = addOffsetToBeat(zeroItem.beat, i);
                        newSeg.push(zeroItem);
                    }
                }

                mainSlide.seg = newSeg;
                
                // メイン以外のスライドを削除リストに登録
                for (let i = 1; i < targetSlides.length; i++) {
                    allDeletedNotes.add(targetSlides[i]);
                }
                
                totalJoinedCount += targetSlides.length;
                resultLogs.push(`<span style="color:#28a745;">✅ 範囲 ${range.index}: ${targetSlides.length}個を結合しました</span>`);
            }

            if (totalJoinedCount === 0) {
                msgDiv.style.color = "#d32f2f";
                return msgDiv.innerHTML = "指定された範囲内に結合可能なスライドが一つも見つかりませんでした。";
            }

            // ゴミスライドを全体データから一括削除
            data.note = notes.filter(n => !allDeletedNotes.has(n));

            const outJson = JSON.stringify(data); 
            const blob = new Blob([outJson], { type: "application/octet-stream" });
            const url = URL.createObjectURL(blob);
            
            dlLink.href = url;
            let originalName = file.name;
            let dotIndex = originalName.lastIndexOf('.');
            if(dotIndex !== -1) { originalName = originalName.substring(0, dotIndex); }
            dlLink.download = originalName + "_joined.mc";
            
            dlLink.style.display = "block";
            
            // 処理結果をまとめて表示
            msgDiv.innerHTML = `<b>【処理結果】合計 ${totalJoinedCount}個 のスライドを処理しました！</b><br><br>` + resultLogs.join("<br>");

        } catch (err) {
            console.error(err);
            msgDiv.style.color = "#d32f2f";
            msgDiv.innerHTML = "ファイルの解析に失敗しました。";
        }
    };
    reader.readAsText(file);
}
</script>

</body>
</html>
