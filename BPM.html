<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPM Multi-Generator</title>
    <style>
        :root { --primary: #007aff; --bg: #f2f2f7; --card: #ffffff; --danger: #ff3b30; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .card { background: var(--card); border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); max-width: 500px; margin: auto; }
        h2 { margin-top: 0; font-size: 1.2rem; border-bottom: 2px solid var(--bg); padding-bottom: 10px; }
        .global-settings { background: #eef; padding: 10px; border-radius: 8px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .point-container { border-left: 3px solid var(--primary); padding-left: 15px; margin-bottom: 20px; position: relative; }
        .point-title { font-size: 0.9rem; font-weight: bold; color: var(--primary); margin-bottom: 10px; display: flex; justify-content: space-between; }
        .remove-btn { color: var(--danger); background: none; border: none; font-size: 0.8rem; cursor: pointer; padding: 0; }
        .row { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
        .input-box { flex: 1; }
        label { font-size: 0.75rem; display: block; margin-bottom: 4px; color: #555; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .add-btn { background: #e5e5ea; color: #333; border: none; padding: 12px; border-radius: 8px; font-size: 0.9rem; width: 100%; font-weight: bold; margin-bottom: 20px; cursor: pointer; }
        .generate-btn { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; font-size: 1rem; font-weight: bold; cursor: pointer; }
        .generate-btn:active, .add-btn:active { opacity: 0.7; }
        textarea { width: 100%; margin-top: 20px; border-radius: 8px; border: 1px solid #ddd; padding: 10px; font-family: monospace; font-size: 12px; box-sizing: border-box; background: #fafafa; }
        .copy-btn { background: #5856d6; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <h2>BPM等差数列ジェネレーター (複数区間)</h2>
    
    <div class="global-settings">
        <label style="margin:0; font-size:0.9rem;">全体分割数 (32分など):</label>
        <input type="number" id="globalDiv" value="32" style="width:80px; padding:8px;">
    </div>

    <div id="pointsArea">
        <div class="point-container point-node">
            <div class="point-title"><span>ポイント 1 (開始)</span></div>
            <div class="row">
                <div class="input-box"><label>小節</label><input type="number" class="bar" value="0"></div>
                <div class="input-box"><label>拍</label><input type="number" class="tick" value="0"></div>
                <div class="input-box"><label>BPM値</label><input type="number" class="bpm" step="0.1" value="131.0"></div>
            </div>
        </div>
        <div class="point-container point-node">
            <div class="point-title"><span>ポイント 2</span></div>
            <div class="row">
                <div class="input-box"><label>小節</label><input type="number" class="bar" value="4"></div>
                <div class="input-box"><label>拍</label><input type="number" class="tick" value="0"></div>
                <div class="input-box"><label>BPM値</label><input type="number" class="bpm" step="0.1" value="118.0"></div>
            </div>
        </div>
    </div>

    <button class="add-btn" onclick="addPoint()">＋ ポイントを追加</button>

    <button class="generate-btn" onclick="generate()">コードを一括生成する</button>
    
    <textarea id="out" rows="8" readonly placeholder="ここに繋がったコードが生成されます"></textarea>
    <button class="copy-btn" onclick="copyText()">結果をコピー</button>
</div>

<script>
let pointCount = 2;

function addPoint() {
    pointCount++;
    const area = document.getElementById('pointsArea');
    const newPoint = document.createElement('div');
    newPoint.className = 'point-container point-node';
    newPoint.innerHTML = `
        <div class="point-title">
            <span>ポイント ${pointCount}</span>
            <button class="remove-btn" onclick="this.parentElement.parentElement.remove()">削除 ✕</button>
        </div>
        <div class="row">
            <div class="input-box"><label>小節</label><input type="number" class="bar" value=""></div>
            <div class="input-box"><label>拍</label><input type="number" class="tick" value=""></div>
            <div class="input-box"><label>BPM値</label><input type="number" class="bpm" step="0.1" value=""></div>
        </div>
    `;
    area.appendChild(newPoint);
}

function generate() {
    const points = document.querySelectorAll('.point-node');
    const div = parseInt(document.getElementById('globalDiv').value);
    let res = [];
    if (points.length < 2) {
        alert("ポイントは最低2つ必要です");
        return;
    }

    for (let i = 0; i < points.length - 1; i++) {
        const p1 = points[i];
        const p2 = points[i+1];

        const b1 = parseInt(p1.querySelector('.bar').value) || 0;
        const t1 = parseInt(p1.querySelector('.tick').value) || 0;
        const bpm1 = parseFloat(p1.querySelector('.bpm').value) || 0;

        const b2 = parseInt(p2.querySelector('.bar').value) || 0;
        const t2 = parseInt(p2.querySelector('.tick').value) || 0;
        const bpm2 = parseFloat(p2.querySelector('.bpm').value) || 0;

        const startTotal = b1 * div + t1;
        const endTotal = b2 * div + t2;
        const steps = endTotal - startTotal;

        if (steps <= 0) {
            alert(`エラー: ポイント${i+1} から ${i+2} の位置関係がおかしいです。`);
            return;
        }

        const bpmDiff = (bpm2 - bpm1) / steps;
        const isLastSection = (i === points.length - 2);
        const loopEnd = isLastSection ? steps : steps - 1;

        for (let j = 0; j <= loopEnd; j++) {
            let t = startTotal + j;
            let b = Math.floor(t / div);
            let tk = t % div;
            let val = parseFloat((bpm1 + (bpmDiff * j)).toFixed(8));
            
            // 整数でも必ず小数点(例: 131.0)が付くようにフォーマット
            let valStr = val % 1 === 0 ? val.toFixed(1) : val.toString();
            
            res.push(`{"beat":[${b},${tk},${div}],"bpm":${valStr}}`);
        }
    }
    document.getElementById('out').value = res.join(",");
}

function copyText() {
    const out = document.getElementById('out');
    if (!out.value) return;
    out.select();
    document.execCommand("copy");
    alert("コピーしました！");
}
</script>

</body>
</html>
