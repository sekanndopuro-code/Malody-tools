<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>しましまtoDelay敷</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; color: #333; }
        .container { background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        h1 { font-size: 1.4em; text-align: center; margin-bottom: 20px; color: #222; }
        .desc { font-size: 0.85em; color: #555; margin-top: -10px; margin-bottom: 20px; line-height: 1.4; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; }
        input[type="text"], input[type="file"], input[type="number"] { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 1em; }
        .note { font-size: 0.8em; color: #666; margin-top: 5px; display: block; line-height: 1.4; }
        
        button { padding: 12px 20px; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1em; width: 100%; font-weight: bold; transition: 0.2s; margin-top: 10px; }
        .btn-process { background: #e91e63; font-size: 1.1em; padding: 15px; box-shadow: 0 4px 6px rgba(233, 30, 99, 0.3); }
        .btn-process:hover { background: #c2185b; }
        
        #dlLink { display: none; margin-top: 20px; text-align: center; padding: 15px; background: #007bff; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; transition: 0.2s; box-shadow: 0 4px 6px rgba(0, 123, 255, 0.3); }
        #dlLink:hover { background: #0056b3; }
        #resultMsg { margin-top: 15px; font-size: 0.9em; font-weight: bold; line-height: 1.6; }
        .log-box { background: #f8f9fa; border: 1px solid #dee2e6; padding: 10px; border-radius: 4px; max-height: 150px; overflow-y: auto; font-size: 0.85em; font-family: monospace; color: #555; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🦓 しましまtoDelay敷</h1>
    <p class="desc">
        譜面内にある「逆走しているスライド(しましま)」を自動検知し、<b>delayエフェクトによる巻き戻し</b>を使って正規の表現に変換します。<br>
        BPMに応じた15桁精度のミリ秒計算や、後続ノーツの音ズレ補正(Beatずらし)をすべて自動で行います。
    </p>
    
    <div class="form-group" style="margin-bottom: 20px;">
        <label>📁 .mcファイルを選択</label>
        <input type="file" id="mcFile" accept="*/*">
    </div>

    <div class="form-group" style="background: #fff0f5; padding: 15px; border-radius: 8px; border: 1px solid #f8bbd0;">
        <label style="color: #c2185b;">⏱️ 巻き戻し時間 (拍単位)</label>
        <input type="number" id="dtHaku" value="0.125" step="0.001">
        <span class="note">デフォルトは <b>0.125</b>（1/8拍 ＝ 1/32小節）。<br>delayで巻き戻す時間幅を指定します。しましまの間隔に合わせて変更してください。</span>
    </div>

    <button type="button" class="btn-process" onclick="processMC()">✨ Delay敷きに変換する</button>

    <div id="resultMsg"></div>
    <a id="dlLink" href="#">💾 変換済みファイルをダウンロード</a>
</div>

<script>
function beatToPoint(beat) {
    if (!beat || beat.length !== 3) return 0;
    if (beat[2] === 0) return beat[0];
    return beat[0] + (beat[1] / beat[2]);
}

function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }

function beatAdd(beat1, beat2) {
    if (!beat1) return [...beat2];
    if (!beat2) return [...beat1];
    const m1 = beat1[0], n1 = beat1[1] || 0, d1 = beat1[2] === 0 ? 1 : (beat1[2] || 1);
    const m2 = beat2[0], n2 = beat2[1] || 0, d2 = beat2[2] === 0 ? 1 : (beat2[2] || 1);
    const num1 = n1 * d2;
    const num2 = n2 * d1;
    const den = d1 * d2;
    let num = num1 + num2;
    let m = m1 + m2 + Math.floor(num / den);
    let n = num % den;
    if (n === 0) return [m, 0, 0];
    const g = gcd(n, den);
    return [m, n / g, den / g];
}

function beatSub(beat1, beat2) {
    if (!beat1) return [0, 0, 0];
    if (!beat2) return [...beat1];
    const m1 = beat1[0], n1 = beat1[1] || 0, d1 = beat1[2] === 0 ? 1 : (beat1[2] || 1);
    const m2 = beat2[0], n2 = beat2[1] || 0, d2 = beat2[2] === 0 ? 1 : (beat2[2] || 1);
    const num1 = (m1 * d1 + n1) * d2;
    const num2 = (m2 * d2 + n2) * d1;
    const den = d1 * d2;
    let diffNum = num1 - num2;
    const m = Math.floor(diffNum / den);
    const n = diffNum - (m * den);
    if (n === 0) return [m, 0, 0];
    const g = gcd(n, den);
    return [m, n / g, den / g];
}

// 実時間からその時点でのBPMを取得する
function getBpmAt(point, timeArray) {
    let bpm = 120;
    for (let ev of timeArray) {
        if (beatToPoint(ev.beat) <= point + 1e-5) {
            if (ev.bpm) bpm = ev.bpm;
        }
    }
    return bpm;
}

function processMC() {
    const fileInput = document.getElementById("mcFile");
    const dtHakuInput = document.getElementById("dtHaku").value;
    const msgDiv = document.getElementById("resultMsg");
    const dlLink = document.getElementById("dlLink");
    
    msgDiv.innerHTML = "";
    dlLink.style.display = "none";

    if (!fileInput.files.length) {
        msgDiv.style.color = "#d32f2f";
        return msgDiv.innerHTML = "ファイルを選択してください。";
    }

    const dtHaku = parseFloat(dtHakuInput);
    if (isNaN(dtHaku) || dtHaku <= 0) {
        msgDiv.style.color = "#d32f2f";
        return msgDiv.innerHTML = "巻き戻し時間には正の数値を入力してください。";
    }

    // 巻き戻し時間(拍)をBeat配列(小節単位)に変換
    // 1小節 = 4拍。Δt_beat = dtHaku / 4 小節
    // 分数化： numerator = dtHaku * 1000, denominator = 4000
    const num = Math.round(dtHaku * 1000);
    const den = 4000;
    const g = gcd(num, den);
    const dtBeat = [0, num / g, den / g];

    const file = fileInput.files[0];
    const reader = new FileReader();
    
    reader.onload = function(e) {
        try {
            const data = JSON.parse(e.target.result);
            if (!data.note || !data.time) {
                msgDiv.style.color = "#d32f2f";
                return msgDiv.innerHTML = "無効な譜面データです。(noteまたはtimeが見つかりません)";
            }

            const notes = data.note;
            const timeEvents = data.time;
            let delayTriggers = [];
            let logTexts =[];

            // 1. 全スライドから「逆走（しましま）」を検知し、グローバルなトリガーリストを作成
            for (let i = 0; i < notes.length; i++) {
                const note = notes[i];
                if (note.seg && Array.isArray(note.seg)) {
                    for (let j = 1; j < note.seg.length; j++) {
                        let prev = note.seg[j - 1];
                        let curr = note.seg[j];
                        // 直前より時間が戻っているか？(1/10000などの微小ズレは無視して判定)
                        if (beatToPoint(curr.beat) < beatToPoint(prev.beat) - 1e-4) {
                            delayTriggers.push({
                                origBeat: prev.beat,
                                point: beatToPoint(prev.beat)
                            });
                        }
                    }
                }
            }

            if (delayTriggers.length === 0) {
                msgDiv.style.color = "#17a2b8";
                return msgDiv.innerHTML = "譜面内に逆走(しましま)スライドが見つかりませんでした。";
            }

            // トリガーを時間順にソートし、同時刻の重複を排除
            delayTriggers.sort((a, b) => a.point - b.point);
            let uniqueTriggers =[];
            for (let trig of delayTriggers) {
                if (uniqueTriggers.length === 0 || trig.point > uniqueTriggers[uniqueTriggers.length - 1].point + 1e-4) {
                    uniqueTriggers.push(trig);
                }
            }

            logTexts.push(`📌 逆走箇所を ${uniqueTriggers.length} 回検知しました。`);

            // グローバルオフセット計算関数
            function getGlobalOffset(origPoint) {
                let offset = [0, 0, 0];
                for (let trig of uniqueTriggers) {
                    // そのノーツの本来の実時間が、トリガーの発動時間より確実におそければズラす
                    if (origPoint > trig.point + 1e-4) {
                        offset = beatAdd(offset, dtBeat);
                    }
                }
                return offset;
            }

            // 2. スライドの逆走を正規化し、内部Beatを補正
            for (let i = 0; i < notes.length; i++) {
                let note = notes[i];
                // スライド始点の補正 (始点自体は逆走しない単一時間)
                note.beat = beatAdd(note.beat, getGlobalOffset(beatToPoint(note.beat)));

                if (note.seg && Array.isArray(note.seg)) {
                    let newSeg = [];
                    let localOffset = [0, 0, 0];
                    
                    for (let j = 0; j < note.seg.length; j++) {
                        let curr = note.seg[j];
                        if (j > 0 && beatToPoint(curr.beat) < beatToPoint(note.seg[j - 1].beat) - 1e-4) {
                            // 逆走発生！
                            let prev = note.seg[j - 1];
                            
                            // ① 直前の進行を短くカット (B')
                            let B_dash_orig = beatSub(prev.beat, dtBeat);
                            newSeg.pop(); // 先に追加したprevを取り除く
                            newSeg.push({ beat: beatAdd(B_dash_orig, localOffset), x: prev.x });
                            
                            // ② 戻り線を描く (C) - 座標は逆走先のAの座標
                            newSeg.push({ beat: beatAdd(prev.beat, localOffset), x: curr.x });
                            
                            // オフセットを加算 (以降の内部Beatを進める)
                            localOffset = beatAdd(localOffset, dtBeat);
                            
                            // ③ 逆走先 A(curr) 自身は追加せずスキップ。
                            // 次のループで処理される D が、C からの進行線となる。
                            continue;
                        }
                        
                        newSeg.push({ beat: beatAdd(curr.beat, localOffset), x: curr.x });
                    }
                    note.seg = newSeg;
                }
            }

            // 他のすべてのノーツ(タップ等)の補正
            // ※スライド以外のノーツも全て getGlobalOffset でずらす必要がありますが、
            // 上のループで「note.beat」を全て一括で変換済みです！

            // 3. timeイベントの補正と、delayイベントの追加
            let newTimeEvents =[];
            
            // 既存のtimeイベントのbeatをずらす
            for (let ev of timeEvents) {
                let p = beatToPoint(ev.beat);
                ev.beat = beatAdd(ev.beat, getGlobalOffset(p));
                newTimeEvents.push(ev);
            }

            // delayイベントを生成して追加
            for (let trig of uniqueTriggers) {
                let bpm = getBpmAt(trig.point, timeEvents); // ズラす前の元のtime配列でBPMを参照
                
                // ミリ秒計算: 60000 / BPM * 拍数
                let delayMs = - (60000 / bpm * dtHaku);
                // 有効数字15桁に丸める
                let exactDelay = parseFloat(delayMs.toPrecision(15));
                
                // トリガーが配置される内部Beatを計算
                // (トリガー自体の時間 + トリガー以前に発生したオフセット)
                let trigBeatInside = beatAdd(trig.origBeat, getGlobalOffset(trig.point));
                
                newTimeEvents.push({
                    beat: trigBeatInside,
                    bpm: bpm,
                    delay: exactDelay
                });
                
                logTexts.push(`⏱️ [${trigBeatInside.join(",")}] に delay: ${exactDelay}ms を追加しました。`);
            }

            // time配列をbeat順にソートして上書き
            newTimeEvents.sort((a, b) => beatToPoint(a.beat) - beatToPoint(b.beat));
            data.time = newTimeEvents;

            const outJson = JSON.stringify(data); 
            const blob = new Blob([outJson], { type: "application/octet-stream" });
            const url = URL.createObjectURL(blob);
            
            dlLink.href = url;
            let originalName = file.name;
            let dotIndex = originalName.lastIndexOf('.');
            if(dotIndex !== -1) { originalName = originalName.substring(0, dotIndex); }
            dlLink.download = originalName + "_delay_converted.mc";
            
            dlLink.style.display = "block";
            
            msgDiv.style.color = "#c2185b";
            msgDiv.innerHTML = `<b>🎉 変換完了！完璧な音ズレ補正を行いました！</b><br>
            <div class="log-box">${logTexts.join("<br>")}</div>`;

        } catch (err) {
            console.error(err);
            msgDiv.style.color = "#d32f2f";
            msgDiv.innerHTML = "ファイルの解析に失敗しました。データが破損している可能性があります。";
        }
    };
    reader.readAsText(file);
}
</script>

</body>
</html>
