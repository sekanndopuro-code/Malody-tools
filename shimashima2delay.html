<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>しましまtoDelay敷</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; color: #333; }
        .container { background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        h1 { font-size: 1.4em; text-align: center; margin-bottom: 20px; color: #222; }
        .desc { font-size: 0.85em; color: #555; margin-top: -10px; margin-bottom: 20px; line-height: 1.4; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; }
        input[type="text"], input[type="file"], input[type="number"] { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 1em; }
        .note { font-size: 0.8em; color: #666; margin-top: 5px; display: block; line-height: 1.4; }
        
        button { padding: 12px 20px; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1em; width: 100%; font-weight: bold; transition: 0.2s; margin-top: 10px; }
        .btn-process { background: #e91e63; font-size: 1.1em; padding: 15px; box-shadow: 0 4px 6px rgba(233, 30, 99, 0.3); }
        .btn-process:hover { background: #c2185b; }
        
        #dlLink { display: none; margin-top: 20px; text-align: center; padding: 15px; background: #007bff; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; transition: 0.2s; box-shadow: 0 4px 6px rgba(0, 123, 255, 0.3); }
        #dlLink:hover { background: #0056b3; }
        #resultMsg { margin-top: 15px; font-size: 0.9em; font-weight: bold; line-height: 1.6; }
        .log-box { background: #f8f9fa; border: 1px solid #dee2e6; padding: 10px; border-radius: 4px; max-height: 200px; overflow-y: auto; font-size: 0.85em; font-family: monospace; color: #555; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🦓 しましまtoDelay敷</h1>
    <p class="desc">
        譜面内の「逆走(しましま)スライド」を自動検知し、<b>Delayエフェクトによる巻き戻し</b>を使った正規の表現に変換（展開）します。<br>
        ミリ秒計算、後続ノーツの音ズレ補正をすべて自動で行います。
    </p>
    
    <div class="form-group" style="margin-bottom: 20px;">
        <label>📁 .mcファイルを選択</label>
        <input type="file" id="mcFile" accept="*/*">
    </div>

    <div class="form-group" style="background: #fff0f5; padding: 15px; border-radius: 8px; border: 1px solid #f8bbd0;">
        <label style="color: #c2185b;">⏱️ 基準BPM</label>
        <input type="number" id="baseBpm" value="160" step="0.1">
        <span class="note">譜面の <b>time</b> 配列からBPMを自動取得して計算しますが、取得できなかった場合はこのBPMを基準にミリ秒を算出します。</span>
    </div>

    <button type="button" class="btn-process" onclick="processMC()">変換する</button>

    <div id="resultMsg"></div>
    <a id="dlLink" href="#">💾 変換済みファイルをダウンロード</a>
</div>

<script>
function beatToPoint(beat) {
    if (!beat || beat.length !== 3) return 0;
    if (beat[2] === 0) return beat[0];
    return beat[0] + (beat[1] / beat[2]);
}

function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }

function beatAdd(beat1, beat2) {
    if (!beat1) return [...beat2];
    if (!beat2) return [...beat1];
    const m1 = beat1[0], n1 = beat1[1] || 0, d1 = beat1[2] === 0 ? 1 : (beat1[2] || 1);
    const m2 = beat2[0], n2 = beat2[1] || 0, d2 = beat2[2] === 0 ? 1 : (beat2[2] || 1);
    const num1 = n1 * d2;
    const num2 = n2 * d1;
    const den = d1 * d2;
    let num = num1 + num2;
    let m = m1 + m2 + Math.floor(num / den);
    let n = num % den;
    if (n === 0) return[m, 0, 0];
    const g = gcd(n, den);
    return[m, n / g, den / g];
}

function beatSub(beat1, beat2) {
    if (!beat1) return[0, 0, 0];
    if (!beat2) return [...beat1];
    const m1 = beat1[0], n1 = beat1[1] || 0, d1 = beat1[2] === 0 ? 1 : (beat1[2] || 1);
    const m2 = beat2[0], n2 = beat2[1] || 0, d2 = beat2[2] === 0 ? 1 : (beat2[2] || 1);
    const num1 = (m1 * d1 + n1) * d2;
    const num2 = (m2 * d2 + n2) * d1;
    const den = d1 * d2;
    let diffNum = num1 - num2;
    const m = Math.floor(diffNum / den);
    const n = diffNum - (m * den);
    if (n === 0) return[m, 0, 0];
    const g = gcd(Math.abs(n), den);
    return [m, n / g, den / g];
}

// 1/10000などの近似化ズレを除去し、本来のグリッド(192分音符)にスナップする関数
function snapToBeat(point) {
    let m = Math.floor(point + 1e-6);
    let frac = point - m;
    let den = 192;
    let num = Math.round(frac * den);
    if (num === 0) return [m, 0, 0];
    if (num === den) return [m + 1, 0, 0];
    let g = gcd(num, den);
    return [m, num / g, den / g];
}

// その時間(point)でのBPMを取得する
function getBpmAt(point, timeArray, defaultBpm) {
    let bpm = defaultBpm;
    for (let ev of timeArray) {
        if (beatToPoint(ev.beat) <= point + 1e-5) {
            if (ev.bpm) bpm = ev.bpm;
        }
    }
    return bpm;
}

function processMC() {
    const fileInput = document.getElementById("mcFile");
    const baseBpmInput = parseFloat(document.getElementById("baseBpm").value);
    const msgDiv = document.getElementById("resultMsg");
    const dlLink = document.getElementById("dlLink");
    
    msgDiv.innerHTML = "";
    dlLink.style.display = "none";

    if (!fileInput.files.length) {
        msgDiv.style.color = "#d32f2f";
        return msgDiv.innerHTML = "ファイルを選択してください。";
    }

    const file = fileInput.files[0];
    const reader = new FileReader();
    
    reader.onload = function(e) {
        try {
            const data = JSON.parse(e.target.result);
            if (!data.note || !data.time) {
                msgDiv.style.color = "#d32f2f";
                return msgDiv.innerHTML = "無効な譜面データです。";
            }

            const notes = data.note;
            const origTimeEvents = JSON.parse(JSON.stringify(data.time)); // BPM参照用
            let logTexts =[];
            
            // 1. 全スライドから「逆行」を検知し、巻き戻りイベントを抽出
            let globalBackbacks =[];
            
            for (let note of notes) {
                if (note.seg && Array.isArray(note.seg)) {
                    // 近似化されたズレを取り除き、本来のBeat配列にする
                    let cleanSegs = note.seg.map(s => ({ origBeat: snapToBeat(beatToPoint(s.beat)), x: s.x }));
                    
                    for (let i = 1; i < cleanSegs.length; i++) {
                        let prev = cleanSegs[i-1];
                        let curr = cleanSegs[i];
                        
                        // 戻っているか判定 (1e-4以上の戻り)
                        if (beatToPoint(curr.origBeat) < beatToPoint(prev.origBeat) - 1e-4) {
                            let diffBeat = beatSub(prev.origBeat, curr.origBeat);
                            let origAbsBeat = beatAdd(note.beat, prev.origBeat);
                            
                            globalBackbacks.push({
                                origAbsBeat: origAbsBeat,
                                origAbsPoint: beatToPoint(origAbsBeat),
                                diffBeat: diffBeat
                            });
                        }
                    }
                }
            }

            if (globalBackbacks.length === 0) {
                msgDiv.style.color = "#17a2b8";
                return msgDiv.innerHTML = "譜面内に逆走(しましま)スライドが見つかりませんでした。";
            }

            // 同時刻の逆行イベントをまとめる（複数スライドが同時に折り返す場合）
            globalBackbacks.sort((a, b) => a.origAbsPoint - b.origAbsPoint);
            let uniqueBackbacks =[];
            for (let b of globalBackbacks) {
                if (uniqueBackbacks.length === 0 || b.origAbsPoint > uniqueBackbacks[uniqueBackbacks.length - 1].origAbsPoint + 1e-4) {
                    uniqueBackbacks.push(b);
                } else {
                    // 同時刻なら戻り量が大きい方を採用
                    let last = uniqueBackbacks[uniqueBackbacks.length - 1];
                    if (beatToPoint(b.diffBeat) > beatToPoint(last.diffBeat)) {
                        last.diffBeat = b.diffBeat;
                    }
                }
            }
            
            logTexts.push(`📌 全 ${uniqueBackbacks.length} 箇所の折り返し(Delay発動ポイント)を検知しました。`);

            // 指定された絶対時間より「前」に発生した逆行量の合計を返す関数
            function getGlobalShift(origAbsPoint) {
                let shift = [0,0,0];
                for (let b of uniqueBackbacks) {
                    if (origAbsPoint > b.origAbsPoint + 1e-4) {
                        shift = beatAdd(shift, b.diffBeat);
                    }
                }
                return shift;
            }

            const EPSILON = [0, 1, 9999]; // 1/9999の近似化

            // 2. 全てのノーツの時間を未来へずらし、スライドを「広げる」
            for (let note of notes) {
                let origNoteBeat = note.beat;
                let origNotePoint = beatToPoint(origNoteBeat);
                
                // スライド始点のシフト量
                let localAccum = getGlobalShift(origNotePoint);
                note.beat = beatAdd(origNoteBeat, localAccum);

                if (note.seg && Array.isArray(note.seg)) {
                    let cleanSegs = note.seg.map(s => ({ origBeat: snapToBeat(beatToPoint(s.beat)), x: s.x }));
                    let newSeg =[];
                    let prevOrigPoint = 0;
                    
                    for (let i = 0; i < cleanSegs.length; i++) {
                        let currOrigBeat = cleanSegs[i].origBeat;
                        let currOrigPoint = beatToPoint(currOrigBeat);
                        
                        if (i > 0 && currOrigPoint < prevOrigPoint - 1e-4) {
                            // 逆行発生！
                            let diffBeat = beatSub(cleanSegs[i-1].origBeat, currOrigBeat);
                            localAccum = beatAdd(localAccum, diffBeat);
                            
                            // ワープを防ぐため、直前のsegの時間を 1/9999 手前にする(近似化)
                            let lastSeg = newSeg[newSeg.length - 1];
                            lastSeg.beat = beatSub(lastSeg.beat, EPSILON);
                        }
                        
                        // 広げられた後の論理的絶対時間を計算
                        let logicalAbsBeat = beatAdd(beatAdd(origNoteBeat, currOrigBeat), localAccum);
                        // スライド始点との差分を新しいseg.beatにする
                        newSeg.push({ beat: beatSub(logicalAbsBeat, note.beat), x: cleanSegs[i].x });
                        
                        prevOrigPoint = currOrigPoint;
                    }
                    note.seg = newSeg;
                }
            }

            // 3. timeイベントの時間をずらし、Delayイベントを追加する
            let newTimeEvents =[];
            
            for (let ev of data.time) {
                let p = beatToPoint(ev.beat);
                ev.beat = beatAdd(ev.beat, getGlobalShift(p));
                newTimeEvents.push(ev);
            }

            for (let b of uniqueBackbacks) {
                let bpm = getBpmAt(b.origAbsPoint, origTimeEvents, baseBpmInput);
                
                // ミリ秒計算: 60000 / BPM * (拍数 = point * 4)
                let diffPoint = beatToPoint(b.diffBeat);
                let delayMs = - (60000 / bpm * (diffPoint * 4));
                
                // 有効数字15桁で出力
                let exactDelay = parseFloat(delayMs.toPrecision(15));
                
                // Delayを発動させる「広げられた後」の絶対時間
                let shiftBeforeEvent = getGlobalShift(b.origAbsPoint);
                let delayAbsBeat = beatAdd(b.origAbsBeat, shiftBeforeEvent);
                
                newTimeEvents.push({
                    beat: delayAbsBeat,
                    bpm: bpm,
                    delay: exactDelay
                });
                
                logTexts.push(`⏱️ Delay配置:[${delayAbsBeat.join(",")}] に ${exactDelay} ms 追加`);
            }

            newTimeEvents.sort((a, b) => beatToPoint(a.beat) - beatToPoint(b.beat));
            data.time = newTimeEvents;

            const outJson = JSON.stringify(data); 
            const blob = new Blob([outJson], { type: "application/octet-stream" });
            const url = URL.createObjectURL(blob);
            
            dlLink.href = url;
            let originalName = file.name;
            let dotIndex = originalName.lastIndexOf('.');
            if(dotIndex !== -1) { originalName = originalName.substring(0, dotIndex); }
            dlLink.download = originalName + "_delay_converted.mc";
            
            dlLink.style.display = "block";
            
            msgDiv.style.color = "#c2185b";
            msgDiv.innerHTML = `<b>🎉 変換完了！完璧な音ズレ補正を行いました！</b><br>
            <div class="log-box">${logTexts.join("<br>")}</div>`;

        } catch (err) {
            console.error(err);
            msgDiv.style.color = "#d32f2f";
            msgDiv.innerHTML = "ファイルの解析に失敗しました。データが破損している可能性があります。";
        }
    };
    reader.readAsText(file);
}
</script>

</body>
</html>
