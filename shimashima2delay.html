<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>しましまtoDelay敷</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; color: #333; }
        .container { background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        h1 { font-size: 1.4em; text-align: center; margin-bottom: 20px; color: #222; }
        .desc { font-size: 0.85em; color: #555; margin-top: -10px; margin-bottom: 20px; line-height: 1.4; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; }
        input[type="text"], input[type="file"], input[type="number"] { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 1em; }
        .note { font-size: 0.8em; color: #666; margin-top: 5px; display: block; line-height: 1.4; }
        
        button { padding: 12px 20px; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1em; width: 100%; font-weight: bold; transition: 0.2s; margin-top: 10px; }
        .btn-process { background: #e91e63; font-size: 1.1em; padding: 15px; box-shadow: 0 4px 6px rgba(233, 30, 99, 0.3); }
        .btn-process:hover { background: #c2185b; }
        
        #dlLink { display: none; margin-top: 20px; text-align: center; padding: 15px; background: #007bff; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; transition: 0.2s; box-shadow: 0 4px 6px rgba(0, 123, 255, 0.3); }
        #dlLink:hover { background: #0056b3; }
        #resultMsg { margin-top: 15px; font-size: 0.9em; font-weight: bold; line-height: 1.6; }
        .log-box { background: #f8f9fa; border: 1px solid #dee2e6; padding: 10px; border-radius: 4px; max-height: 200px; overflow-y: auto; font-size: 0.85em; font-family: monospace; color: #555; margin-top: 10px; }
        .error-log { color: #d32f2f; background: #ffebee; border-color: #f5c6cb; }
    </style>
</head>
<body>

<div class="container">
    <h1>🦓 しましまtoDelay敷</h1>
    <p class="desc">
        譜面内の「逆走(しましま)スライド」を自動検知し、<b>Delayエフェクトによる巻き戻し</b>を使った正規の表現に変換（展開）します。<br>
        1/9999の近似化、ミリ秒計算、後続ノーツの音ズレ補正をすべて自動で行います。
    </p>
    
    <div class="form-group" style="margin-bottom: 20px;">
        <label>📁 対象の .mcファイルを選択</label>
        <input type="file" id="mcFile" accept="*/*">
    </div>

    <div class="form-group" style="background: #fff0f5; padding: 15px; border-radius: 8px; border: 1px solid #f8bbd0;">
        <label style="color: #c2185b;">⏱️ 基準BPM</label>
        <input type="number" id="baseBpm" value="160" step="0.1">
        <span class="note">譜面の <code>time</code> 配列からBPMを自動取得して計算しますが、万が一取得できなかった場合はこのBPMを基準にDelay値を算出します。</span>
    </div>

    <button type="button" class="btn-process" onclick="processMC()">✨ Delay敷きに変換する</button>

    <div id="resultMsg"></div>
    <a id="dlLink" href="#">💾 変換済みファイルをダウンロード</a>
</div>

<script>
// 安全にBeat配列を取得する
function safeBeat(beat) {
    if (!beat || !Array.isArray(beat) || beat.length < 3) return [0, 0, 1];
    return [beat[0], beat[1], beat[2] === 0 ? 1 : beat[2]];
}

// Beatを「拍(Point)」に変換
function beatToPoint(beat) {
    let b = safeBeat(beat);
    return b[0] + (b[1] / b[2]);
}

function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }

function beatAdd(beat1, beat2) {
    let b1 = safeBeat(beat1), b2 = safeBeat(beat2);
    const m1 = b1[0], n1 = b1[1], d1 = b1[2];
    const m2 = b2[0], n2 = b2[1], d2 = b2[2];
    const num1 = n1 * d2;
    const num2 = n2 * d1;
    const den = d1 * d2;
    let num = num1 + num2;
    let m = m1 + m2 + Math.floor(num / den);
    let n = num % den;
    if (n === 0) return[m, 0, 0];
    const g = gcd(n, den);
    return[m, n / g, den / g];
}

function beatSub(beat1, beat2) {
    let b1 = safeBeat(beat1), b2 = safeBeat(beat2);
    const m1 = b1[0], n1 = b1[1], d1 = b1[2];
    const m2 = b2[0], n2 = b2[1], d2 = b2[2];
    const num1 = (m1 * d1 + n1) * d2;
    const num2 = (m2 * d2 + n2) * d1;
    const den = d1 * d2;
    let diffNum = num1 - num2;
    const m = Math.floor(diffNum / den);
    const n = diffNum - (m * den);
    if (n === 0) return [m, 0, 0];
    const g = gcd(Math.abs(n), den);
    return [m, n / g, den / g];
}

// 1/32などの近似ズレを除去し、本来のグリッド(192分音符)にスナップする
function snapToBeat(point) {
    if (isNaN(point)) return [0, 0, 1];
    let m = Math.floor(point + 1e-6);
    let frac = point - m;
    let den = 192;
    let num = Math.round(frac * den);
    if (num === 0) return [m, 0, 0];
    if (num === den) return[m + 1, 0, 0];
    let g = gcd(num, den);
    return [m, num / g, den / g];
}

function getBpmAt(point, timeArray, defaultBpm) {
    let bpm = defaultBpm || 160;
    if (Array.isArray(timeArray)) {
        for (let ev of timeArray) {
            if (ev && ev.beat && beatToPoint(ev.beat) <= point + 1e-5) {
                if (ev.bpm) bpm = ev.bpm;
            }
        }
    }
    return bpm;
}

function processMC() {
    const fileInput = document.getElementById("mcFile");
    let baseBpmInput = parseFloat(document.getElementById("baseBpm").value);
    if (isNaN(baseBpmInput) || baseBpmInput <= 0) baseBpmInput = 160;
    
    const msgDiv = document.getElementById("resultMsg");
    const dlLink = document.getElementById("dlLink");
    
    msgDiv.innerHTML = "";
    dlLink.style.display = "none";

    if (!fileInput.files.length) {
        msgDiv.style.color = "#d32f2f";
        return msgDiv.innerHTML = "ファイルを選択してください。";
    }

    const file = fileInput.files[0];
    const reader = new FileReader();
    
    reader.onload = function(e) {
        try {
            let rawStr = e.target.result;
            let cleanStr = rawStr.replace(/^\uFEFF/, '').trim();
            const data = JSON.parse(cleanStr);
            
            if (!data.note || !Array.isArray(data.note)) {
                throw new Error("譜面データに note 配列が存在しません。");
            }
            if (!data.time || !Array.isArray(data.time)) {
                data.time =[]; 
            }

            const notes = data.note;
            const origTimeEvents = JSON.parse(JSON.stringify(data.time)); // BPM参照用
            let logTexts =[];
            
            // ========================================================
            // 1. 全スライドから「逆行」を検知し、巻き戻りイベントを抽出
            // ========================================================
            let globalTriggers =[];
            
            for (let note of notes) {
                if (note && note.beat && note.seg && Array.isArray(note.seg)) {
                    let cleanSegs = note.seg.map(s => ({ origBeat: snapToBeat(beatToPoint(safeBeat(s.beat))) }));
                    
                    for (let i = 1; i < cleanSegs.length; i++) {
                        let prevPoint = beatToPoint(cleanSegs[i-1].origBeat);
                        let currPoint = beatToPoint(cleanSegs[i].origBeat);
                        
                        // 直前より時間が戻っているか？(微小ズレは無視して判定)
                        if (currPoint < prevPoint - 1e-4) {
                            let diffBeat = beatSub(cleanSegs[i-1].origBeat, cleanSegs[i].origBeat);
                            // 逆行が発動する絶対時間 (スライド始点 + 直前segの本来の時間)
                            let origAbsBeat = beatAdd(safeBeat(note.beat), cleanSegs[i-1].origBeat); 
                            
                            globalTriggers.push({
                                origAbsBeat: origAbsBeat,
                                origAbsPoint: beatToPoint(origAbsBeat),
                                diffBeat: diffBeat,
                                slideRef: note,
                                segIndex: i
                            });
                        }
                    }
                }
            }

            if (globalTriggers.length === 0) {
                msgDiv.style.color = "#17a2b8";
                return msgDiv.innerHTML = "譜面内に逆走(しましま)スライドが見つかりませんでした。";
            }

            // 同時刻の逆行イベントをまとめる（複数スライドが同時に折り返す場合）
            globalTriggers.sort((a, b) => a.origAbsPoint - b.origAbsPoint);
            let uniqueTriggers =[];
            for (let trig of globalTriggers) {
                if (uniqueTriggers.length === 0 || trig.origAbsPoint > uniqueTriggers[uniqueTriggers.length - 1].origAbsPoint + 1e-4) {
                    uniqueTriggers.push(trig);
                } else {
                    let last = uniqueTriggers[uniqueTriggers.length - 1];
                    // 同時刻なら、最も大きく戻るものを採用
                    if (beatToPoint(trig.diffBeat) > beatToPoint(last.diffBeat)) {
                        last.diffBeat = trig.diffBeat; 
                    }
                }
            }
            
            logTexts.push(`📌 逆走箇所を ${uniqueTriggers.length} 箇所検知しました。`);

            // 任意の絶対時間(origAbsPoint)より「前」に発動した逆行量の合計を返す
            function getGlobalShift(origAbsPoint) {
                let shift = [0, 0, 0];
                for (let trig of uniqueTriggers) {
                    // そのトリガー発動時間より厳密に未来であればズラす
                    if (origAbsPoint > trig.origAbsPoint + 1e-4) {
                        shift = beatAdd(shift, trig.diffBeat);
                    }
                }
                return shift;
            }

            const EPSILON =[0, 1, 9999]; // ワープ回避のための 1/9999 近似化

            // ========================================================
            // 2. スライドの展開（広げる処理）とノーツ全体の音ズレ補正
            // ========================================================
            for (let note of notes) {
                if (!note || !note.beat) continue;
                
                let origNoteBeat = safeBeat(note.beat);
                let origNotePoint = beatToPoint(origNoteBeat);
                
                // スライド始点のシフト量 (始点より前に発生した逆行量)
                let localAccum = getGlobalShift(origNotePoint - 1e-4); 
                note.beat = beatAdd(origNoteBeat, localAccum);

                if (note.seg && Array.isArray(note.seg)) {
                    let cleanSegs = note.seg.map(s => ({ 
                        origBeat: snapToBeat(beatToPoint(safeBeat(s.beat))), 
                        x: (typeof s.x === 'number') ? s.x : 0 
                    }));
                    
                    let newSegs =[];
                    let prevOrigPoint = 0;
                    
                    for (let i = 0; i < cleanSegs.length; i++) {
                        let currOrigBeat = cleanSegs[i].origBeat;
                        let currOrigPoint = beatToPoint(currOrigBeat);
                        
                        if (i > 0 && currOrigPoint < prevOrigPoint - 1e-4) {
                            // 逆行発生！
                            let diffBeat = beatSub(cleanSegs[i-1].origBeat, currOrigBeat);
                            // 逆行した分だけ、これ以降の配置Beatを未来へ押し出す
                            localAccum = beatAdd(localAccum, diffBeat);
                            
                            // ワープを防ぐため、直前のsegを 1/9999 手前に近似化する
                            let lastSeg = newSegs[newSegs.length - 1];
                            lastSeg.beat = beatSub(safeBeat(lastSeg.beat), EPSILON);
                        }
                        
                        // 広げられた後の論理的絶対時間を計算
                        let logicalAbsBeat = beatAdd(beatAdd(origNoteBeat, currOrigBeat), localAccum);
                        // スライド始点との差分を新しいseg.beatにする
                        newSegs.push({ beat: beatSub(logicalAbsBeat, safeBeat(note.beat)), x: cleanSegs[i].x });
                        
                        prevOrigPoint = currOrigPoint;
                    }
                    note.seg = newSegs;
                }
            }

            // ========================================================
            // 3. timeイベントの補正と、Delayイベントの配置
            // ========================================================
            let newTimeEvents =[];
            
            for (let ev of data.time) {
                if (!ev || !ev.beat) continue;
                let p = beatToPoint(safeBeat(ev.beat));
                ev.beat = beatAdd(safeBeat(ev.beat), getGlobalShift(p - 1e-4));
                newTimeEvents.push(ev);
            }

            for (let trig of uniqueTriggers) {
                let bpm = getBpmAt(trig.origAbsPoint, origTimeEvents, baseBpmInput);
                if (bpm <= 0) bpm = 160; 
                
                // ★ Malody専用の正しいDelay値計算 ★
                // (ずれる拍数) × (1拍のミリ秒 = 60000 / BPM)
                let diffPoint = beatToPoint(trig.diffBeat);
                let delayValue = - (diffPoint * (60000 / bpm));
                
                let exactDelay = parseFloat(delayValue.toPrecision(15));
                
                // Delayを発動させる絶対時間 (展開後の時間)
                let shiftBefore = getGlobalShift(trig.origAbsPoint - 1e-4);
                let delayAbsBeat = beatAdd(trig.origAbsBeat, shiftBefore);
                
                newTimeEvents.push({
                    beat: delayAbsBeat,
                    bpm: bpm,
                    delay: exactDelay
                });
                
                logTexts.push(`⏱️ 展開位置[${delayAbsBeat.join(",")}] に Delay ${exactDelay} を追加しました`);
            }

            // 全てのtimeイベントを時間順にソート
            newTimeEvents.sort((a, b) => beatToPoint(safeBeat(a.beat)) - beatToPoint(safeBeat(b.beat)));
            data.time = newTimeEvents;

            const outJson = JSON.stringify(data); 
            const blob = new Blob([outJson], { type: "application/octet-stream" });
            const url = URL.createObjectURL(blob);
            
            dlLink.href = url;
            let originalName = file.name;
            let dotIndex = originalName.lastIndexOf('.');
            if(dotIndex !== -1) { originalName = originalName.substring(0, dotIndex); }
            dlLink.download = originalName + "_delay_converted.mc";
            
            dlLink.style.display = "block";
            
            msgDiv.style.color = "#c2185b";
            msgDiv.innerHTML = `<b>🎉 変換完了！完璧な展開とDelay計算を行いました！</b><br>
            <div class="log-box">${logTexts.join("<br>")}</div>`;

        } catch (err) {
            console.error(err);
            msgDiv.style.color = "#d32f2f";
            msgDiv.innerHTML = `<b>ファイルの解析に失敗しました。</b><br>
            <div class="log-box error-log">エラー詳細：<br>${err.message}<br><br>${err.stack}</div>`;
        }
    };
    reader.readAsText(file);
}
</script>

</body>
</html>
