<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Malody BPM特定ツール (スマホ対応版)</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
  <style>
    body { padding: 1rem; max-width: 800px; margin: 0 auto; }
    h1 { font-size: 1.5rem; text-align: center; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
    .card { background: #f9f9f9; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; border: 1px solid #ddd; }
    label { font-size: 0.85rem; font-weight: bold; margin-bottom: 0.2rem; display: block; color: #444; }
    input[type="number"], input[type="text"] { margin-bottom: 0.5rem; padding: 0.4rem; font-size: 1rem; }
    .result-text { font-size: 1.2rem; font-weight: bold; color: #10b981; }
    .json-box { background: #2d3748; color: #fff; padding: 0.5rem; border-radius: 4px; font-family: monospace; font-size: 0.85rem; overflow-wrap: break-word; margin-bottom: 0.5rem; }
    button { padding: 0.5rem; font-size: 0.9rem; margin-bottom: 0.5rem; }
    .btn-group { display: flex; gap: 0.5rem; }
    .btn-group button { flex: 1; }
  </style>
</head>
<body>
  <h1>Malody BPM特定ツール</h1>
  
  <div class="card">
    <div class="grid-2">
      <div><label>倍率</label><input type="number" id="c1" value="8" oninput="calc()"></div>
      <div><label>計測BPM</label><input type="number" id="c2" value="1600" oninput="calc()"></div>
    </div>
    
    <label>距離 (分母 / 分子)</label>
    <div class="grid-2">
      <input type="number" id="c3" value="1" placeholder="分母" oninput="calc()">
      <input type="number" id="c4" value="4" placeholder="分子" oninput="calc()">
    </div>

    <label>終点ズレ (分母 / 分子)</label>
    <div class="grid-2">
      <input type="number" id="c5" value="24" placeholder="分母" oninput="calc()">
      <input type="number" id="c6" value="5" placeholder="分子" oninput="calc()">
    </div>

    <label>始点ズレ (分母 / 分子)</label>
    <div class="grid-2">
      <input type="number" id="c7" value="24" placeholder="分母" oninput="calc()">
      <input type="number" id="c8" value="5" placeholder="分子" oninput="calc()">
    </div>

    <label>始点ズレ方向 (空欄=手前, 1など入力=奥)</label>
    <input type="text" id="c9" value="1" oninput="calc()">

    <div class="grid-2">
      <div><label>拍数(計測基準)</label><input type="number" id="c10" value="96" oninput="calc()"></div>
      <div><label>今の基礎hs</label><input type="number" id="c11" value="1" step="0.1" oninput="calc()"></div>
      <div><label>拍数(元の値)</label><input type="number" id="c12" value="12" oninput="calc()"></div>
      <div><label>計算用拍数</label><input type="number" id="c13" value="12" oninput="calc()"></div>
    </div>
  </div>

  <div class="btn-group">
    <button onclick="nextStep('')">次の始点へ (手前)</button>
    <button onclick="nextStep('1')">次の始点へ (奥)</button>
  </div>

  <div class="card">
    <label>【奥】計算結果 BPM:</label>
    <div class="result-text" id="bpm-oku">-</div>
    <label>【奥】JSON出力 (BPM / HS):</label>
    <div class="json-box" id="json-oku-bpm"></div>
    <div class="json-box" id="json-oku-hs"></div>

    <hr>

    <label>【手前】計算結果 BPM:</label>
    <div class="result-text" id="bpm-temae">-</div>
    <label>【手前】JSON出力 (BPM / HS):</label>
    <div class="json-box" id="json-temae-bpm"></div>
    <div class="json-box" id="json-temae-hs"></div>
  </div>

  <script>
    function calc() {
      const c1 = parseFloat(document.getElementById('c1').value) || 1;
      const c2 = parseFloat(document.getElementById('c2').value) || 0;
      const c3 = parseFloat(document.getElementById('c3').value) || 1;
      const c4 = parseFloat(document.getElementById('c4').value) || 0;
      const c5 = parseFloat(document.getElementById('c5').value) || 1;
      const c6 = parseFloat(document.getElementById('c6').value) || 0;
      const c7 = parseFloat(document.getElementById('c7').value) || 1;
      const c8 = parseFloat(document.getElementById('c8').value) || 0;
      const c9 = document.getElementById('c9').value;
      const c11 = parseFloat(document.getElementById('c11').value) || 1;
      const c12 = parseFloat(document.getElementById('c12').value) || 0;
      const c13 = parseFloat(document.getElementById('c13').value) || 0;

      const dist = c4 / c3;
      const end_shift = c6 / c5;
      const start_shift_base = c8 / c7;
      const start_shift = (c9 === "") ? -start_shift_base : start_shift_base;

      // 奥BPM計算 (E2)
      const denom_oku = dist + end_shift + start_shift;
      const e2 = denom_oku !== 0 ? (c2 * dist) / denom_oku : 0;
      const bpm_oku = e2 / c1;

      // 手前BPM計算 (E3)
      const denom_temae = dist - (end_shift - start_shift);
      const e3 = denom_temae !== 0 ? (c2 * dist) / denom_temae : 0;
      const bpm_temae = e3 / c1;

      document.getElementById('bpm-oku').innerText = bpm_oku.toFixed(10);
      document.getElementById('bpm-temae').innerText = bpm_temae.toFixed(10);

      // JSON出力用の拍数小数点計算
      const diff = c12 - c13;
      let beat_dec = 3;
      if(diff === 0) beat_dec = 0;
      else if(diff === 0.25) beat_dec = 1;
      else if(diff === 0.5) beat_dec = 2;

      // JSON生成
      if (bpm_oku > 0) {
        document.getElementById('json-oku-bpm').innerText = `,"beat":[${c13},${beat_dec},4],"bpm":${bpm_oku}`;
        document.getElementById('json-oku-hs').innerText = `,"beat":[${c13},${beat_dec},4],"hs":${(c2/e2*c11).toFixed(14)}`;
      }
      if (bpm_temae > 0) {
        document.getElementById('json-temae-bpm').innerText = `,"beat":[${c13},${beat_dec},4],"bpm":${bpm_temae}`;
        document.getElementById('json-temae-hs').innerText = `,"beat":[${c13},${beat_dec},4],"hs":${(c2/e3*c11).toFixed(14)}`;
      }
    }

    function nextStep(direction) {
      // 終点のズレを次の始点のズレにコピー
      document.getElementById('c7').value = document.getElementById('c5').value;
      document.getElementById('c8').value = document.getElementById('c6').value;
      // ズレ方向を更新
      document.getElementById('c9').value = direction;
      calc();
    }

    // 初期計算
    calc();
  </script>
</body>
</html>
