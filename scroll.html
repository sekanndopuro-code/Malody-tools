<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPM補正つき 等差Scrollジェネレーター</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; color: #333; }
        .container { background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        h1 { font-size: 1.4em; text-align: center; margin-bottom: 20px; color: #222; }
        .desc { font-size: 0.85em; color: #555; margin-top: -10px; margin-bottom: 20px; line-height: 1.4; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; }
        input[type="text"], input[type="file"], input[type="number"] { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 1em; }
        
        .global-settings { background: #eef8ff; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #cce5ff; }
        .setting-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .setting-row:last-child { margin-bottom: 0; }
        .setting-row label { flex: 1; font-weight: bold; font-size: 0.85em; color: #0056b3; margin-bottom: 0; }
        .setting-row input { width: 80px; padding: 8px; border: 1px solid #b8daff; border-radius: 6px; font-weight: bold; }
        
        .point-container { background: #f9f9f9; border-left: 4px solid #007aff; border-radius: 0 8px 8px 0; padding: 15px; margin-bottom: 15px; position: relative; }
        .point-title { font-size: 1.05em; font-weight: bold; color: #007aff; margin-bottom: 15px; display: flex; justify-content: space-between; border-bottom: 2px solid #e2e8f0; padding-bottom: 5px; }
        .row { display: flex; gap: 8px; align-items: center; }
        .input-box { flex: 1; }
        .input-box label { font-size: 0.75rem; color: #666; margin-bottom: 4px; }
        
        button { padding: 12px 20px; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1em; width: 100%; font-weight: bold; transition: 0.2s; margin-top: 10px; }
        .btn-add { background: #17a2b8; margin-bottom: 20px; }
        .btn-add:hover { background: #138496; }
        .btn-remove { background: #dc3545; padding: 6px 12px; margin-top: 0; font-size: 0.85em; width: auto; float: right; border-radius: 4px; }
        .btn-remove:hover { background: #c82333; }
        .btn-process { background: #007aff; font-size: 1.1em; padding: 15px; box-shadow: 0 4px 6px rgba(0, 122, 255, 0.3); }
        .btn-process:hover { background: #005bb5; }
        
        .clearfix::after { content: ""; clear: both; display: table; }
        #dlLink { display: none; margin-top: 20px; text-align: center; padding: 15px; background: #28a745; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; transition: 0.2s; box-shadow: 0 4px 6px rgba(40, 167, 69, 0.3); }
        #dlLink:hover { background: #218838; }
        #resultMsg { margin-top: 15px; font-size: 0.9em; font-weight: bold; line-height: 1.6; }
        .error-log { color: #d32f2f; background: #ffebee; border-color: #f5c6cb; padding: 10px; border-radius: 4px; margin-top: 10px; font-size: 0.85em; font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <h1>🌀 BPM補正つき等差Scroll</h1>
    <p class="desc">
        指定区間に等差数列による<code>scroll</code>を生成します。<br>
        同時に譜面内のBPM変化を自動で読み取り、<b>見た目のスクロール速度が狂わないようBPM相殺計算</b>を行って<code>effect</code>配列に追加します。
    </p>
    
    <div class="form-group" style="margin-bottom: 20px;">
        <label>📁 対象の .mcファイルを選択</label>
        <input type="file" id="mcFile" accept="*/*">
    </div>

    <div class="global-settings">
        <div class="setting-row">
            <label>基準の「割る数」 (Base BPM)</label>
            <input type="number" id="baseBpm" value="240">
        </div>
        <div class="setting-row">
            <label>全体分割数 (分母: 32分など)</label>
            <input type="number" id="globalDiv" value="32">
        </div>
    </div>

    <div id="pointsArea">
        <div class="point-container point-node" id="point-1">
            <div class="point-title">
                <span>📍 ポイント 1 (開始)</span>
            </div>
            <div class="row">
                <div class="input-box"><label>小節</label><input type="number" class="bar" value="3"></div>
                <div class="input-box"><label>拍</label><input type="number" class="tick" value="0"></div>
                <div class="input-box"><label>目標Scroll倍率</label><input type="number" class="scroll" step="0.1" value="1.0"></div>
            </div>
        </div>
        <div class="point-container point-node" id="point-2">
            <div class="point-title">
                <span>📍 ポイント 2</span>
                <button type="button" class="btn-remove" onclick="removePoint('point-2')">🗑️ 削除</button>
            </div>
            <div class="row">
                <div class="input-box"><label>小節</label><input type="number" class="bar" value="4"></div>
                <div class="input-box"><label>拍</label><input type="number" class="tick" value="0"></div>
                <div class="input-box"><label>目標Scroll倍率</label><input type="number" class="scroll" step="0.1" value="5.0"></div>
            </div>
        </div>
    </div>

    <button type="button" class="btn-add" onclick="addPoint()">➕ ポイントを追加</button>
    <button type="button" class="btn-process" onclick="processMC()">🚀 Scrollを生成して書き込む</button>

    <div id="resultMsg"></div>
    <a id="dlLink" href="#">💾 書き込み済みファイルをダウンロード</a>
</div>

<script>
let pointIdCounter = 3;

function addPoint() {
    const area = document.getElementById('pointsArea');
    const id = "point-" + pointIdCounter++;
    const newPoint = document.createElement('div');
    newPoint.className = 'point-container point-node';
    newPoint.id = id;
    newPoint.innerHTML = `
        <div class="point-title">
            <span>📍 ポイント</span>
            <button type="button" class="btn-remove" onclick="removePoint('${id}')">🗑️ 削除</button>
        </div>
        <div class="row">
            <div class="input-box"><label>小節</label><input type="number" class="bar" value=""></div>
            <div class="input-box"><label>拍</label><input type="number" class="tick" value=""></div>
            <div class="input-box"><label>目標Scroll倍率</label><input type="number" class="scroll" step="0.1" value=""></div>
        </div>
    `;
    area.appendChild(newPoint);
    updateLabels();
}

function removePoint(id) {
    const container = document.getElementById("pointsArea");
    if (container.querySelectorAll('.point-node').length <= 2) {
        alert("ポイントは最低2つ必要です！");
        return;
    }
    document.getElementById(id).remove();
    updateLabels();
}

function updateLabels() {
    const titles = document.querySelectorAll('.point-title span');
    titles.forEach((el, idx) => {
        el.innerText = `📍 ポイント ${idx + 1} ${idx === 0 ? '(開始)' : ''}`;
    });
}

function safeBeat(beat) {
    if (!beat || !Array.isArray(beat) || beat.length < 3) return [0, 0, 1];
    return [beat[0], beat[1], beat[2] === 0 ? 1 : beat[2]];
}

function beatToPoint(beat) {
    let b = safeBeat(beat);
    return b[0] + (b[1] / b[2]);
}

// その時間(point)におけるBPMを取得する関数
function getBpmAt(point, timeArray, defaultBpm) {
    let bpm = defaultBpm;
    if (Array.isArray(timeArray)) {
        for (let ev of timeArray) {
            if (ev.bpm !== undefined && beatToPoint(safeBeat(ev.beat)) <= point + 1e-5) {
                bpm = ev.bpm;
            }
        }
    }
    return bpm;
}

function processMC() {
    const fileInput = document.getElementById("mcFile");
    const baseBpm = parseFloat(document.getElementById('baseBpm').value);
    const div = parseInt(document.getElementById('globalDiv').value);
    const msgDiv = document.getElementById("resultMsg");
    const dlLink = document.getElementById("dlLink");
    
    msgDiv.innerHTML = "";
    dlLink.style.display = "none";

    if (!fileInput.files.length) {
        msgDiv.style.color = "#d32f2f";
        return msgDiv.innerHTML = "ファイルを選択してください。";
    }
    if (isNaN(baseBpm) || isNaN(div) || div <= 0) {
        msgDiv.style.color = "#d32f2f";
        return msgDiv.innerHTML = "基準BPMと分割数には正しい数値を入力してください！";
    }

    const file = fileInput.files[0];
    const reader = new FileReader();
    
    reader.onload = function(e) {
        try {
            let rawStr = e.target.result;
            let cleanStr = rawStr.replace(/^\uFEFF/, '').trim();
            const data = JSON.parse(cleanStr);
            
            if (!data.effect || !Array.isArray(data.effect)) data.effect =[];
            const timeArray = data.time ||[];

            const points = document.querySelectorAll('.point-node');
            if (points.length < 2) {
                msgDiv.style.color = "#d32f2f";
                return msgDiv.innerHTML = "ポイントは最低2つ必要です！";
            }

            let generatedEffects =[];

            // 等差数列生成ループ
            for (let i = 0; i < points.length - 1; i++) {
                const p1 = points[i];
                const p2 = points[i+1];

                const b1 = parseInt(p1.querySelector('.bar').value) || 0;
                const t1 = parseInt(p1.querySelector('.tick').value) || 0;
                const s1 = parseFloat(p1.querySelector('.scroll').value) || 0;

                const b2 = parseInt(p2.querySelector('.bar').value) || 0;
                const t2 = parseInt(p2.querySelector('.tick').value) || 0;
                const s2 = parseFloat(p2.querySelector('.scroll').value) || 0;

                const startTotal = b1 * div + t1;
                const endTotal = b2 * div + t2;
                const steps = endTotal - startTotal;

                if (steps <= 0) {
                    msgDiv.style.color = "#d32f2f";
                    return msgDiv.innerHTML = `⚠️ ポイント ${i+1} と ${i+2} の時間関係が不正です（時間が戻っている、または同じです）。`;
                }

                const scrollDiff = (s2 - s1) / steps;
                
                // 最後の区間以外は、終わりの点を省く（次の区間の最初の点と被らないようにするため）
                const isLastSection = (i === points.length - 2);
                const loopEnd = isLastSection ? steps : steps - 1;

                for (let j = 0; j <= loopEnd; j++) {
                    let t = startTotal + j;
                    let m = Math.floor(t / div);
                    let tk = t % div;
                    let beatArr = [m, tk, div];
                    let pointVal = beatToPoint(beatArr);

                    // 目標とするScroll倍率
                    let targetScroll = s1 + (scrollDiff * j);
                    
                    // その瞬間のBPMを取得
                    let currentBpm = getBpmAt(pointVal, timeArray, baseBpm);
                    if (currentBpm <= 0) currentBpm = baseBpm; // ゼロ割防止
                    
                    // ★BPM補正計算： 目標倍率 × (基準BPM / 現在BPM)
                    let finalScroll = targetScroll * (baseBpm / currentBpm);
                    
                    // JSの計算誤差を消すため、小数点第10位で丸め
                    finalScroll = parseFloat(finalScroll.toFixed(10));

                    generatedEffects.push({
                        beat: beatArr,
                        scroll: finalScroll
                    });
                }
            }

            // ★ 重複マージ処理 ★
            // 同じBeatタイミングに既存のエフェクト(例:bgg等)がある場合、scrollプロパティだけを上書き/追加する
            let effectMap = new Map();
            
            for (let ev of data.effect) {
                if (!ev || !ev.beat) continue;
                let ptStr = beatToPoint(safeBeat(ev.beat)).toFixed(6); // 微小誤差吸収のためのキー
                if (!effectMap.has(ptStr)) {
                    effectMap.set(ptStr, Object.assign({}, ev));
                } else {
                    Object.assign(effectMap.get(ptStr), ev);
                }
            }

            // 生成したScrollをMapに書き込む
            for (let genEv of generatedEffects) {
                let ptStr = beatToPoint(genEv.beat).toFixed(6);
                if (!effectMap.has(ptStr)) {
                    effectMap.set(ptStr, { beat: genEv.beat });
                }
                effectMap.get(ptStr).scroll = genEv.scroll;
            }

            // Mapから配列に戻して時間順にソート
            data.effect = Array.from(effectMap.values()).sort((a, b) => beatToPoint(safeBeat(a.beat)) - beatToPoint(safeBeat(b.beat)));

            const outJson = JSON.stringify(data); 
            const blob = new Blob([outJson], { type: "application/octet-stream" });
            const url = URL.createObjectURL(blob);
            
            dlLink.href = url;
            let originalName = file.name;
            let dotIndex = originalName.lastIndexOf('.');
            if(dotIndex !== -1) { originalName = originalName.substring(0, dotIndex); }
            dlLink.download = originalName + "_scrolled.mc";
            
            dlLink.style.display = "block";
            
            msgDiv.style.color = "#28a745";
            msgDiv.innerHTML = `<b>🎉 生成完了！ 合計 ${generatedEffects.length} 箇所のScrollを書き込みました！</b>`;

        } catch (err) {
            console.error(err);
            msgDiv.style.color = "#d32f2f";
            msgDiv.innerHTML = `<b>ファイルの解析に失敗しました。</b><br>
            <div class="error-log">エラー詳細：<br>${err.message}</div>`;
        }
    };
    reader.readAsText(file);
}
</script>

</body>
</html>
