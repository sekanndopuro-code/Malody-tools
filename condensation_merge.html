<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>縮合結合ツール</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; color: #333; }
        .container { background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 550px; margin: auto; }
        h1 { font-size: 1.4em; text-align: center; margin-bottom: 20px; color: #222; }
        .desc { font-size: 0.85em; color: #555; margin-top: -10px; margin-bottom: 20px; line-height: 1.4; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; }
        input[type="text"], input[type="file"] { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 1em; }
        
        .range-group { background: #f9f9f9; border: 2px solid #e2e8f0; border-radius: 8px; padding: 15px; margin-bottom: 15px; position: relative; }
        .range-group h4 { margin-top: 0; margin-bottom: 15px; font-size: 1.1em; color: #4a5568; border-bottom: 2px solid #e2e8f0; padding-bottom: 5px; }
        
        button { padding: 12px 20px; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1em; width: 100%; font-weight: bold; transition: 0.2s; margin-top: 10px; }
        .btn-add { background: #17a2b8; margin-bottom: 20px; }
        .btn-add:hover { background: #138496; }
        .btn-remove { background: #dc3545; padding: 8px 15px; margin-top: 5px; font-size: 0.9em; width: auto; float: right; }
        .btn-remove:hover { background: #c82333; }
        .btn-process { background: #673ab7; font-size: 1.1em; padding: 15px; box-shadow: 0 4px 6px rgba(103, 58, 183, 0.3); }
        .btn-process:hover { background: #512da8; }
        
        .clearfix::after { content: ""; clear: both; display: table; }
        #dlLink { display: none; margin-top: 20px; text-align: center; padding: 15px; background: #007bff; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; transition: 0.2s; box-shadow: 0 4px 6px rgba(0, 123, 255, 0.3); }
        #dlLink:hover { background: #0056b3; }
        #resultMsg { margin-top: 15px; font-size: 0.9em; font-weight: bold; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚡ 縮合結合ツール</h1>
    <p class="desc">
        装飾スライドを <b>1/100 に圧縮</b>し、さらに <b>+1/99 シフト</b> して結合します。<br>
        プラス側の装飾ブロックの末尾に<b>「直角に曲がるためのseg(x=0)」</b>を自動で挿入します。<br>
        自動的に、<code>scroll: 100</code>(1/99)、<code>jump: 99999</code>(1/4)、<code>scroll: 1</code>(1/2) を配置します。
    </p>
    
    <div class="form-group" style="margin-bottom: 20px;">
        <label>📁 対象の .mcファイルを選択</label>
        <input type="file" id="mcFile" accept="*/*">
    </div>

    <div id="rangesContainer">
        <div class="range-group clearfix" id="range-0">
            <h4>範囲 1</h4>
            <div class="form-group">
                <label>始点Beat</label>
                <input type="text" class="startBeat" placeholder="例: 449, 0, 1">
            </div>
            <div class="form-group">
                <label>終点Beat</label>
                <input type="text" class="endBeat" placeholder="例: 460, 0, 0">
            </div>
            <button type="button" class="btn-remove" onclick="removeRange('range-0')">🗑️ 削除</button>
        </div>
    </div>

    <button type="button" class="btn-add" onclick="addRange()">➕ 選択範囲を追加する</button>
    <button type="button" class="btn-process" onclick="processMC()">⚡ 縮合結合を実行</button>

    <div id="resultMsg"></div>
    <a id="dlLink" href="#">💾 結合済みファイルをダウンロード</a>
</div>

<script>
let rangeIdCounter = 1;

function addRange() {
    const container = document.getElementById("rangesContainer");
    const id = "range-" + rangeIdCounter++;
    const html = `
    <div class="range-group clearfix" id="${id}">
        <h4>範囲指定</h4>
        <div class="form-group">
            <label>始点Beat</label>
            <input type="text" class="startBeat" placeholder="例: 449, 0, 1">
        </div>
        <div class="form-group">
            <label>終点Beat</label>
            <input type="text" class="endBeat" placeholder="例: 460, 0, 0">
        </div>
        <button type="button" class="btn-remove" onclick="removeRange('${id}')">🗑️ 削除</button>
    </div>
    `;
    container.insertAdjacentHTML('beforeend', html);
    updateRangeLabels();
}

function removeRange(id) {
    const container = document.getElementById("rangesContainer");
    if (container.children.length <= 1) {
        alert("最低でも1つの範囲指定が必要です！");
        return;
    }
    document.getElementById(id).remove();
    updateRangeLabels();
}

function updateRangeLabels() {
    const groups = document.querySelectorAll('.range-group h4');
    groups.forEach((el, index) => {
        el.innerText = `範囲 ${index + 1}`;
    });
}

function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }

function safeBeat(beat) {
    if (!beat || !Array.isArray(beat) || beat.length < 3) return[0, 0, 1];
    return [beat[0], beat[1], beat[2] === 0 ? 1 : beat[2]];
}

function beatToPoint(beat) {
    let b = safeBeat(beat);
    return b[0] + (b[1] / b[2]);
}

function parseBeat(str) {
    if (!str) return null;
    str = str.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));
    const parts = str.match(/-?\d+/g);
    if (parts && parts.length >= 3) {
        return[Number(parts[0]), Number(parts[1]), Number(parts[2])];
    }
    return null;
}

// ========================================================
// 安全な分数計算 (ユーザー様ご提供のコード)
// ========================================================
function limitDenom(beat, maxDenom = 100000) {
    let m = beat[0], n = beat[1] || 0, d = beat[2] === 0 ? 1 : (beat[2] || 1);
    if (n === 0) return [m, 0, 1];
    let g = Math.abs(gcd(n, d));
    n /= g; d /= g;
    if (d > maxDenom) {
        let val = n / d;
        let newNum = Math.round(val * maxDenom);
        let newDen = maxDenom;
        let g2 = Math.abs(gcd(newNum, newDen));
        return[m, newNum / g2, newDen / g2];
    }
    return[m, n, d];
}

function beatDiff(beat1, beat2) {
    if (!beat1) return[0, 0, 0];
    if (!beat2) return[...beat1];
    const m1 = beat1[0], n1 = beat1[1] || 0, d1 = beat1[2] === 0 ? 1 : (beat1[2] || 1);
    const m2 = beat2[0], n2 = beat2[1] || 0, d2 = beat2[2] === 0 ? 1 : (beat2[2] || 1);
    const num1 = (m1 * d1 + n1) * d2;
    const num2 = (m2 * d2 + n2) * d1;
    const den = d1 * d2;
    let diffNum = num1 - num2;
    if (diffNum < 0) diffNum = 0; 
    const m = Math.floor(diffNum / den);
    const n = diffNum % den;
    if (n === 0) return [m, 0, 1];
    return limitDenom([m, n, den]);
}

function beatAdd(beat1, beat2) {
    if (!beat1) return[...beat2];
    if (!beat2) return[...beat1];
    const m1 = beat1[0], n1 = beat1[1] || 0, d1 = beat1[2] === 0 ? 1 : (beat1[2] || 1);
    const m2 = beat2[0], n2 = beat2[1] || 0, d2 = beat2[2] === 0 ? 1 : (beat2[2] || 1);
    const num1 = n1 * d2;
    const num2 = n2 * d1;
    const den = d1 * d2;
    let num = num1 + num2;
    let m = m1 + m2 + Math.floor(num / den);
    let n = num % den;
    if (n === 0) return [m, 0, 1];
    return limitDenom([m, n, den]);
}

function beatDiv(beat, divisor) {
    if (!beat) return[0, 0, 1];
    const m = beat[0], n = beat[1] || 0, d = beat[2] === 0 ? 1 : (beat[2] || 1);
    const num = m * d + n;
    const den = d * divisor;
    if (num === 0) return [0, 0, 1];
    let newM = Math.floor(num / den);
    let newN = num % den;
    if (newN === 0) return[newM, 0, 1];
    return limitDenom([newM, newN, den]);
}

// ========================================================
// 重複パトロール (ユーザー様ご提供のコード)
// ========================================================
function fixDuplicateSegs(segArray) {
    let usedPoints =[];
    let fixedCount = 0;
    const MICRO_DEN = 100000;
    
    function addMicroOffset(beat, offsetCount) {
        if (!beat || beat.length !== 3 || offsetCount === 0) return beat;
        let b = beatAdd(beat, [0, offsetCount, MICRO_DEN]);
        return limitDenom(b);
    }

    for (let i = 0; i < segArray.length; i++) {
        if (segArray[i].isMain) {
            usedPoints.push(beatToPoint(segArray[i].beat));
        }
    }

    for (let i = 0; i < segArray.length; i++) {
        let segItem = segArray[i];
        if (segItem.isMain) {
            delete segItem.isMain; 
            continue;
        }

        let p = beatToPoint(segItem.beat);
        let conflictCount = 0;
        let currentP = p;
        
        while (true) {
            let isConflict = false;
            for (let j = 0; j < usedPoints.length; j++) {
                if (Math.abs(currentP - usedPoints[j]) < 1e-5) {
                    isConflict = true;
                    break;
                }
            }
            if (!isConflict) break;
            conflictCount++;
            currentP = p + (conflictCount / MICRO_DEN);
        }
        
        if (conflictCount > 0) {
            segItem.beat = addMicroOffset(segItem.beat, conflictCount);
            fixedCount++;
        }
        usedPoints.push(currentP);
    }
    return fixedCount;
}

function processMC() {
    const fileInput = document.getElementById("mcFile");
    const msgDiv = document.getElementById("resultMsg");
    const dlLink = document.getElementById("dlLink");
    
    msgDiv.innerHTML = "";
    msgDiv.style.color = "#333";
    dlLink.style.display = "none";

    if (!fileInput.files.length) {
        msgDiv.style.color = "#d32f2f";
        return msgDiv.innerHTML = "ファイルを選択してください。";
    }

    const rangeGroups = document.querySelectorAll('.range-group');
    const ranges =[];
    
    for (let i = 0; i < rangeGroups.length; i++) {
        const startStr = rangeGroups[i].querySelector('.startBeat').value;
        const endStr = rangeGroups[i].querySelector('.endBeat').value;
        const startBeat = parseBeat(startStr);
        const endBeat = parseBeat(endStr);
        
        if (!startBeat || !endBeat) {
            msgDiv.style.color = "#d32f2f";
            return msgDiv.innerHTML = `⚠️ 範囲 ${i + 1} のBeatフォーマットが正しくありません。`;
        }
        
        const startPoint = beatToPoint(startBeat);
        const endPoint = beatToPoint(endBeat);
        ranges.push({
            index: i + 1,
            min: Math.min(startPoint, endPoint),
            max: Math.max(startPoint, endPoint)
        });
    }

    const file = fileInput.files[0];
    const reader = new FileReader();
    
    reader.onload = function(e) {
        try {
            let rawStr = e.target.result;
            let cleanStr = rawStr.replace(/^\uFEFF/, '').trim();
            const data = JSON.parse(cleanStr);
            
            if (!data.note) {
                msgDiv.style.color = "#d32f2f";
                return msgDiv.innerHTML = "無効な譜面データです。";
            }
            if (!data.effect || !Array.isArray(data.effect)) {
                data.effect =[];
            }

            const notes = data.note;
            let allDeletedNotes = new Set();
            let totalJoinedCount = 0;
            let resultLogs =[];

            for (let r = 0; r < ranges.length; r++) {
                const range = ranges[r];
                const targetSlides =[];

                for (let i = 0; i < notes.length; i++) {
                    const note = notes[i];
                    if (allDeletedNotes.has(note)) continue;

                    if (note.seg && Array.isArray(note.seg)) {
                        const point = beatToPoint(note.beat);
                        if (point >= range.min - 0.001 && point <= range.max + 0.001) {
                            targetSlides.push(note);
                        }
                    }
                }

                if (targetSlides.length < 2) {
                    resultLogs.push(`<span style="color:#d32f2f;">⚠️ 範囲 ${range.index}: 対象が2つ未満のためスキップ</span>`);
                    continue;
                }

                targetSlides.sort((a, b) => beatToPoint(a.beat) - beatToPoint(b.beat));
                const mainSlide = targetSlides[0];
                const mainBeat = mainSlide.beat;
                const mainX = (typeof mainSlide.x === 'number') ? mainSlide.x : 0;

                let mainOriginalSegs = mainSlide.seg ||[];
                let branches = targetSlides.slice(1);
                
                const shiftBaseBeat =[0, 1, 99];
                let branchEvents =[];
                
                if (branches.length > 0) {
                    for (let branch of branches) {
                        const branchSegs = branch.seg ||[];
                        const branchX = (typeof branch.x === 'number') ? branch.x : 0;
                        const offsetX = branchX - mainX;
                        const origOffsetBeat = beatDiff(branch.beat, mainBeat);
                        
                        // 1/100 圧縮 ＋ 1/99 シフト
                        const compOffsetBeat = beatAdd(shiftBaseBeat, beatDiv(origOffsetBeat, 100));

                        let lastSegBeat = branchSegs.length > 0 ? branchSegs[branchSegs.length - 1].beat : [0,0,0];
                        let compLastSegBeat = beatDiv(lastSegBeat, 100);
                        let compEndRelBeat = beatAdd(compOffsetBeat, compLastSegBeat);
                        
                        branchEvents.push({
                            compOffsetBeat: compOffsetBeat,
                            compEndRelBeat: compEndRelBeat,
                            branchSegs: branchSegs,
                            offsetX: offsetX
                        });
                    }
                }

                branchEvents.sort((a, b) => beatToPoint(a.compEndRelBeat) - beatToPoint(b.compEndRelBeat));

                const newSeg =[];

                // ステップ1: まず装飾ブロック全体を構築
                for (let ev of branchEvents) {
                    newSeg.push({ beat: [...ev.compEndRelBeat], x: 0 }); 
                    for (let j = ev.branchSegs.length - 1; j >= 0; j--) {
                        let s = ev.branchSegs[j];
                        let compSegBeat = beatDiv(s.beat, 100);
                        newSeg.push({ beat: beatAdd(ev.compOffsetBeat, compSegBeat), x: ev.offsetX + s.x });
                    }
                    newSeg.push({ beat: [...ev.compOffsetBeat], x: ev.offsetX });
                    for (let j = 0; j < ev.branchSegs.length; j++) {
                        let s = ev.branchSegs[j];
                        let compSegBeat = beatDiv(s.beat, 100);
                        newSeg.push({ beat: beatAdd(ev.compOffsetBeat, compSegBeat), x: ev.offsetX + s.x });
