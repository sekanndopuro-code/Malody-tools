<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>縮合結合ツール</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; color: #333; }
        .container { background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 550px; margin: auto; }
        h1 { font-size: 1.4em; text-align: center; margin-bottom: 20px; color: #222; }
        .desc { font-size: 0.85em; color: #555; margin-top: -10px; margin-bottom: 20px; line-height: 1.4; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; }
        input[type="text"], input[type="file"] { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 1em; }
        
        .toggle-group { background: #e9ecef; padding: 10px; border-radius: 6px; margin-bottom: 20px; font-size: 0.9em; }
        .toggle-group label { display: inline-flex; align-items: center; font-weight: normal; cursor: pointer; margin-bottom: 0; }
        .toggle-group input[type="checkbox"] { width: auto; margin-right: 8px; transform: scale(1.2); }

        .range-group { background: #f9f9f9; border: 2px solid #e2e8f0; border-radius: 8px; padding: 15px; margin-bottom: 15px; position: relative; }
        .range-group h4 { margin-top: 0; margin-bottom: 15px; font-size: 1.1em; color: #4a5568; border-bottom: 2px solid #e2e8f0; padding-bottom: 5px; }
        
        button { padding: 12px 20px; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1em; width: 100%; font-weight: bold; transition: 0.2s; margin-top: 10px; }
        .btn-add { background: #17a2b8; margin-bottom: 20px; }
        .btn-add:hover { background: #138496; }
        .btn-remove { background: #dc3545; padding: 8px 15px; margin-top: 5px; font-size: 0.9em; width: auto; float: right; }
        .btn-remove:hover { background: #c82333; }
        .btn-process { background: #673ab7; font-size: 1.1em; padding: 15px; box-shadow: 0 4px 6px rgba(103, 58, 183, 0.3); }
        .btn-process:hover { background: #512da8; }
        
        .clearfix::after { content: ""; clear: both; display: table; }
        #dlLink { display: none; margin-top: 20px; text-align: center; padding: 15px; background: #007bff; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; transition: 0.2s; box-shadow: 0 4px 6px rgba(0, 123, 255, 0.3); }
        #dlLink:hover { background: #0056b3; }
        #resultMsg { margin-top: 15px; font-size: 0.9em; font-weight: bold; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚡ 縮合結合ツール</h1>
    <p class="desc">
        装飾スライドを <b>1/200 に圧縮</b>し、さらに <b>+1/99 シフト</b> して結合します。<br>
        マイナス(逆走)スライドでも、幹の現在座標を計算して直角に分岐・帰還します。幹のsegは絶対に変更されません。
    </p>
    
    <div class="form-group">
        <label>📁 対象の .mcファイルを選択</label>
        <input type="file" id="mcFile" accept="*/*">
    </div>

    <!-- エフェクトの自動配置オンオフ機能 -->
    <div class="toggle-group">
        <label>
            <input type="checkbox" id="autoEffectToggle" checked>
            <b>Scroll / Jump エフェクトを自動配置する</b><br>
            <span style="font-size: 0.85em; color: #666; margin-left: 24px; display:block;">
                (1/99にscroll:60、1/8にjump:9999999、1001/8000にscroll:0.3 を配置)<br>
                ※既に同じ位置に同じ値がある場合は重複して追加されません。
            </span>
        </label>
    </div>

    <div id="rangesContainer">
        <div class="range-group clearfix" id="range-0">
            <h4>範囲 1</h4>
            <div class="form-group">
                <label>始点Beat</label>
                <input type="text" class="startBeat" placeholder="例: 449, 0, 1">
            </div>
            <div class="form-group">
                <label>終点Beat</label>
                <input type="text" class="endBeat" placeholder="例: 460, 0, 0">
            </div>
            <button type="button" class="btn-remove" onclick="removeRange('range-0')">🗑️ 削除</button>
        </div>
    </div>

    <button type="button" class="btn-add" onclick="addRange()">➕ 選択範囲を追加する</button>
    <button type="button" class="btn-process" onclick="processMC()">⚡ 縮合結合を実行</button>

    <div id="resultMsg"></div>
    <a id="dlLink" href="#">💾 結合済みファイルをダウンロード</a>
</div>

<script>
let rangeIdCounter = 1;

function addRange() {
    const container = document.getElementById("rangesContainer");
    const id = "range-" + rangeIdCounter++;
    const html = `
    <div class="range-group clearfix" id="${id}">
        <h4>範囲指定</h4>
        <div class="form-group">
            <label>始点Beat</label>
            <input type="text" class="startBeat" placeholder="例: 449, 0, 1">
        </div>
        <div class="form-group">
            <label>終点Beat</label>
            <input type="text" class="endBeat" placeholder="例: 460, 0, 0">
        </div>
        <button type="button" class="btn-remove" onclick="removeRange('${id}')">🗑️ 削除</button>
    </div>
    `;
    container.insertAdjacentHTML('beforeend', html);
    updateRangeLabels();
}

function removeRange(id) {
    const container = document.getElementById("rangesContainer");
    if (container.children.length <= 1) {
        alert("最低でも1つの範囲指定が必要です！");
        return;
    }
    document.getElementById(id).remove();
    updateRangeLabels();
}

function updateRangeLabels() {
    const groups = document.querySelectorAll('.range-group h4');
    groups.forEach((el, index) => {
        el.innerText = `範囲 ${index + 1}`;
    });
}

function safeBeat(beat) {
    if (!beat || !Array.isArray(beat) || beat.length < 3) return [0, 0, 1];
    return [beat[0], beat[1], beat[2] === 0 ? 1 : beat[2]];
}

function beatToPoint(beat) {
    let b = safeBeat(beat);
    return b[0] + (b[1] / b[2]);
}

function parseBeat(str) {
    if (!str) return null;
    str = str.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));
    const parts = str.match(/-?\d+/g);
    if (parts && parts.length >= 3) {
        return[Number(parts[0]), Number(parts[1]), Number(parts[2])];
    }
    return null;
}

function getRelXAt(mainPoints, targetPoint) {
    if (mainPoints.length === 1) return mainPoints[0].x;
    if (targetPoint <= mainPoints[0].point) return mainPoints[0].x;
    if (targetPoint >= mainPoints[mainPoints.length - 1].point) return mainPoints[mainPoints.length - 1].x;
    for (let i = 0; i < mainPoints.length - 1; i++) {
        let p1 = mainPoints[i], p2 = mainPoints[i+1];
        if (p1.point <= targetPoint && targetPoint <= p2.point) {
            if (Math.abs(p2.point - p1.point) < 1e-10) return p2.x;
            let t = (targetPoint - p1.point) / (p2.point - p1.point);
            return p1.x + (p2.x - p1.x) * t;
        }
    }
    return mainPoints[mainPoints.length - 1].x;
}

function hasEffect(effectArray, targetBeat, propName, propValue) {
    const targetPoint = beatToPoint(targetBeat);
    for (let i = 0; i < effectArray.length; i++) {
        const e = effectArray[i];
        if (e[propName] === propValue && e.beat) {
            const ePoint = beatToPoint(e.beat);
            if (Math.abs(ePoint - targetPoint) < 1e-6) return true;
        }
    }
    return false;
}

// ========================================================
// ★ 究極改善： BigIntを用いた完全な誤差0のLCM分数エンジン ★
// （近似処理を完全撤廃。絶対に丸め誤差が起きない計算を行います）
// ========================================================
function gcdBig(a, b) {
    a = a < 0n ? -a : a;
    b = b < 0n ? -b : b;
    while (b !== 0n) { let t = b; b = a % b; a = t; }
    return a;
}

function exactFormat(m, n, d) {
    if (n === 0n) return [Number(m), 0, 1];
    if (d < 0n) { n = -n; d = -d; }
    if (n < 0n) { let shift = (-n) / d + 1n; m -= shift; n += shift * d; }
    if (n >= d) { let shift = n / d; m += shift; n -= shift * d; }
    if (n === 0n) return[Number(m), 0, 1];
    
    let g = gcdBig(n, d);
    n /= g; d /= g;
    return [Number(m), Number(n), Number(d)];
}

function beatDiff(beat1, beat2) {
    if (!beat1) return[0, 0, 0];
    if (!beat2) return [...beat1];
    let m1 = BigInt(beat1[0]), n1 = BigInt(beat1[1] || 0), d1 = BigInt(beat1[2] || 1);
    let m2 = BigInt(beat2[0]), n2 = BigInt(beat2[1] || 0), d2 = BigInt(beat2[2] || 1);
    let lcm = (d1 / gcdBig(d1, d2)) * d2;
    let num1 = m1 * lcm + n1 * (lcm / d1);
    let num2 = m2 * lcm + n2 * (lcm / d2);
    let diffNum = num1 - num2;
    if (diffNum < 0n) diffNum = 0n;
    return exactFormat(0n, diffNum, lcm);
}

function beatAdd(beat1, beat2) {
    if (!beat1) return [...beat2];
    if (!beat2) return [...beat1];
    let m1 = BigInt(beat1[0]), n1 = BigInt(beat1[1] || 0), d1 = BigInt(beat1[2] || 1);
    let m2 = BigInt(beat2[0]), n2 = BigInt(beat2[1] || 0), d2 = BigInt(beat2[2] || 1);
    let lcm = (d1 / gcdBig(d1, d2)) * d2;
    let num = n1 * (lcm / d1) + n2 * (lcm / d2);
    return exactFormat(m1 + m2, num, lcm);
}

function beatDiv(beat, divisor) {
    if (!beat) return [0, 0, 1];
    let m = BigInt(beat[0]), n = BigInt(beat[1] || 0), d = BigInt(beat[2] || 1);
    let div = BigInt(divisor);
    let num = m * d + n;
    let den = d * div;
    return exactFormat(0n, num, den);
}

// ========================================================
// 重複パトロール (誤検知・丸め誤差を排除した完全精度の微小シフト)
// ========================================================
function fixDuplicateSegs(segArray) {
    let usedPoints =[];
    let fixedCount = 0;
    const MICRO_DEN = 1000000; // 100万分の1単位の正確なシフト
    
    function addMicroOffset(beat, offsetCount) {
        if (!beat || beat.length !== 3 || offsetCount === 0) return beat;
        return beatAdd(beat, [0, offsetCount, MICRO_DEN]);
    }

    for (let i = 0; i < segArray.length; i++) {
        if (segArray[i].isMain) usedPoints.push(beatToPoint(segArray[i].beat));
    }

    for (let i = 0; i < segArray.length; i++) {
        let segItem = segArray[i];
        if (segItem.isMain) { delete segItem.isMain; continue; }

        let p = beatToPoint(segItem.beat);
        let conflictCount = 0;
        let currentP = p;
        
        while (true) {
            let isConflict = false;
            for (let j = 0; j < usedPoints.length; j++) {
                // しきい値を 1e-7 に厳格化し、1/6の細かい座標での「誤検知」を防止
                if (Math.abs(currentP - usedPoints[j]) < 1e-7) {
                    isConflict = true; break;
                }
            }
            if (!isConflict) break;
            conflictCount++;
            currentP = p + (conflictCount / MICRO_DEN);
        }
        
        if (conflictCount > 0) {
            segItem.beat = addMicroOffset(segItem.beat, conflictCount);
            fixedCount++;
        }
        usedPoints.push(currentP);
    }
    return fixedCount;
}

function processMC() {
    const fileInput = document.getElementById("mcFile");
    const msgDiv = document.getElementById("resultMsg");
    const dlLink = document.getElementById("dlLink");
    const isAutoEffect = document.getElementById("autoEffectToggle").checked;
    
    msgDiv.innerHTML = "";
    msgDiv.style.color = "#333";
    dlLink.style.display = "none";

    if (!fileInput.files.length) {
        msgDiv.style.color = "#d32f2f";
        return msgDiv.innerHTML = "ファイルを選択してください。";
    }

    const rangeGroups = document.querySelectorAll('.range-group');
    const ranges =[];
    
    for (let i = 0; i < rangeGroups.length; i++) {
        const startStr = rangeGroups[i].querySelector('.startBeat').value;
        const endStr = rangeGroups[i].querySelector('.endBeat').value;
        const startBeat = parseBeat(startStr);
        const endBeat = parseBeat(endStr);
        
        if (!startBeat || !endBeat) {
            msgDiv.style.color = "#d32f2f";
            return msgDiv.innerHTML = `⚠️ 範囲 ${i + 1} のBeatフォーマットが正しくありません。`;
        }
        
        const startPoint = beatToPoint(startBeat);
        const endPoint = beatToPoint(endBeat);
        ranges.push({ index: i + 1, min: Math.min(startPoint, endPoint), max: Math.max(startPoint, endPoint) });
    }

    const file = fileInput.files[0];
    const reader = new FileReader();
    
    reader.onload = function(e) {
        try {
            let rawStr = e.target.result;
            let cleanStr = rawStr.replace(/^\uFEFF/, '').trim();
            const data = JSON.parse(cleanStr);
            
            if (!data.note) {
                msgDiv.style.color = "#d32f2f";
                return msgDiv.innerHTML = "無効な譜面データです。";
            }
            if (!data.effect || !Array.isArray(data.effect)) data.effect =[];

            const notes = data.note;
            let allDeletedNotes = new Set();
            let totalJoinedCount = 0;
            let resultLogs =[];

            for (let r = 0; r < ranges.length; r++) {
                const range = ranges[r];
                const targetSlides =[];

                for (let i = 0; i < notes.length; i++) {
                    const note = notes[i];
                    if (allDeletedNotes.has(note)) continue;

                    if (note.seg && Array.isArray(note.seg)) {
                        const point = beatToPoint(note.beat);
                        if (point >= range.min - 0.001 && point <= range.max + 0.001) {
                            targetSlides.push(note);
                        }
                    }
                }

                if (targetSlides.length < 2) {
                    resultLogs.push(`<span style="color:#d32f2f;">⚠️ 範囲 ${range.index}: 対象が2つ未満のためスキップ</span>`);
                    continue;
                }

                targetSlides.sort((a, b) => beatToPoint(a.beat) - beatToPoint(b.beat));
                const mainSlide = targetSlides[0];
                const mainBeat = mainSlide.beat;
                const mainX = (typeof mainSlide.x === 'number') ? mainSlide.x : 0;

                let mainOriginalSegs = mainSlide.seg ||[];
                let mainPoints = [{ beat: [0,0,1], point: 0, x: 0 }];
                for (let s of mainOriginalSegs) {
                    mainPoints.push({ beat: s.beat, point: beatToPoint(s.beat), x: s.x });
                }

                let branches = targetSlides.slice(1);
                const shiftBaseBeat = [0, 1, 99];
                let branchEvents =[];
                
                if (branches.length > 0) {
                    for (let i = 0; i < branches.length; i++) {
                        const branch = branches[i];
                        const branchSegs = branch.seg ||[];
                        const branchX = (typeof branch.x === 'number') ? branch.x : 0;
                        const offsetX = branchX - mainX;
                        
                        const origOffsetBeat = beatDiff(branch.beat, mainBeat);
                        // 1/200 圧縮 ＋ 1/99 シフト
                        const compOffsetBeat = beatAdd(shiftBaseBeat, beatDiv(origOffsetBeat, 200));

                        branchEvents.push({
                            compOffsetBeat: compOffsetBeat,
                            branchSegs: branchSegs,
                            offsetX: offsetX
                        });
                    }
                }

                branchEvents.sort((a, b) => beatToPoint(a.compOffsetBeat) - beatToPoint(b.compOffsetBeat));

                const newSeg =[];

                for (let ev of branchEvents) {
                    let evStart = beatToPoint(ev.compOffsetBeat);
                    let trunkX = Math.floor(getRelXAt(mainPoints, evStart));

                    newSeg.push({ beat: [...ev.compOffsetBeat], x: trunkX }); 
                    newSeg.push({ beat: [...ev.compOffsetBeat], x: ev.offsetX });

                    for (let j = 0; j < ev.branchSegs.length; j++) {
                        let s = ev.branchSegs[j];
                        let compSegBeat = beatDiv(s.beat, 200);
                        newSeg.push({ beat: beatAdd(ev.compOffsetBeat, compSegBeat), x: ev.offsetX + s.x });
                    }

                    for (let j = ev.branchSegs.length - 2; j >= 0; j--) {
                        let s = ev.branchSegs[j];
                        let compSegBeat = beatDiv(s.beat, 200);
                        newSeg.push({ beat: beatAdd(ev.compOffsetBeat, compSegBeat), x: ev.offsetX + s.x });
                    }
                    
                    newSeg.push({ beat:[...ev.compOffsetBeat], x: ev.offsetX });
                    newSeg.push({ beat: [...ev.compOffsetBeat], x: trunkX }); 
                }

                for (let s of mainOriginalSegs) {
                    let mainSegClone = JSON.parse(JSON.stringify(s));
                    mainSegClone.isMain = true; 
                    newSeg.push(mainSegClone);
                }

                let fixCount = fixDuplicateSegs(newSeg);
                mainSlide.seg = newSeg;
                
                for (let i = 0; i < branches.length; i++) {
                    allDeletedNotes.add(branches[i]);
                }
                
                totalJoinedCount += targetSlides.length;
                let fixMsg = fixCount > 0 ? ` (完全精度での重複回避 ${fixCount}箇所✨)` : "";
                resultLogs.push(`<span style="color:#28a745;">✅ 範囲 ${range.index}: ${targetSlides.length}個を 1/200 縮合結合しました${fixMsg}</span>`);

                if (isAutoEffect) {
                    let scroll1Beat = beatAdd(mainBeat,[0, 1, 99]);
                    if (!hasEffect(data.effect, scroll1Beat, "scroll", 60)) {
                        data.effect.push({ beat: scroll1Beat, scroll: 60 });
                    }

                    let jumpBeat = beatAdd(mainBeat, [0, 1, 8]);
                    if (!hasEffect(data.effect, jumpBeat, "jump", 9999999)) {
                        data.effect.push({ beat: jumpBeat, jump: 9999999 });
                    }

                    let scroll2Beat = beatAdd(mainBeat,[0, 1001, 8000]);
                    if (!hasEffect(data.effect, scroll2Beat, "scroll", 0.3)) {
                        data.effect.push({ beat: scroll2Beat, scroll: 0.3 });
                    }
                }
            }

            if (totalJoinedCount === 0) {
                msgDiv.style.color = "#d32f2f";
                return msgDiv.innerHTML = "指定された範囲内に結合可能なスライドが見つかりませんでした。";
            }

            data.note = notes.filter(n => !allDeletedNotes.has(n));
            data.effect.sort((a, b) => beatToPoint(safeBeat(a.beat)) - beatToPoint(safeBeat(b.beat)));

            const outJson = JSON.stringify(data); 
            const blob = new Blob([outJson], { type: "application/octet-stream" });
            const url = URL.createObjectURL(blob);
            
            dlLink.href = url;
            let originalName = file.name;
            let dotIndex = originalName.lastIndexOf('.');
            if(dotIndex !== -1) { originalName = originalName.substring(0, dotIndex); }
            dlLink.download = originalName + "_condensed.mc";
            
            dlLink.style.display = "block";
            
            msgDiv.innerHTML = `<b>【処理結果】合計 ${totalJoinedCount}個 のスライドを処理しました！</b><br><br>` + resultLogs.join("<br>");

        } catch (err) {
            console.error(err);
            msgDiv.style.color = "#d32f2f";
            msgDiv.innerHTML = "ファイルの解析に失敗しました。";
        }
    };
    reader.readAsText(file);
}
</script>

</body>
</html>
