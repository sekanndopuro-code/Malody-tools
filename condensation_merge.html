<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>縮合結合ツール</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; color: #333; }
        .container { background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 550px; margin: auto; }
        h1 { font-size: 1.4em; text-align: center; margin-bottom: 20px; color: #222; }
        .desc { font-size: 0.85em; color: #555; margin-top: -10px; margin-bottom: 20px; line-height: 1.4; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; }
        input[type="text"], input[type="file"] { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 1em; }
        
        .range-group { background: #f9f9f9; border: 2px solid #e2e8f0; border-radius: 8px; padding: 15px; margin-bottom: 15px; position: relative; }
        .range-group h4 { margin-top: 0; margin-bottom: 15px; font-size: 1.1em; color: #4a5568; border-bottom: 2px solid #e2e8f0; padding-bottom: 5px; }
        
        button { padding: 12px 20px; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1em; width: 100%; font-weight: bold; transition: 0.2s; margin-top: 10px; }
        .btn-add { background: #17a2b8; margin-bottom: 20px; }
        .btn-add:hover { background: #138496; }
        .btn-remove { background: #dc3545; padding: 8px 15px; margin-top: 5px; font-size: 0.9em; width: auto; float: right; }
        .btn-remove:hover { background: #c82333; }
        .btn-process { background: #673ab7; font-size: 1.1em; padding: 15px; box-shadow: 0 4px 6px rgba(103, 58, 183, 0.3); }
        .btn-process:hover { background: #512da8; }
        
        .clearfix::after { content: ""; clear: both; display: table; }
        #dlLink { display: none; margin-top: 20px; text-align: center; padding: 15px; background: #007bff; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; transition: 0.2s; box-shadow: 0 4px 6px rgba(0, 123, 255, 0.3); }
        #dlLink:hover { background: #0056b3; }
        #resultMsg { margin-top: 15px; font-size: 0.9em; font-weight: bold; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚡ 縮合結合ツール</h1>
    <p class="desc">
        装飾を <b>1/100に圧縮</b> ＆ <b>+1/99シフト</b> して結合します。<br>
        装飾ブロックと幹の間に、順序として <b>x=0の頂点</b> を挿入し、直角な折り返しを形成します。<br>
        自動的に、<code>scroll: 100</code>(1/99)、<code>jump: 99999</code>(1/4)、<code>scroll: 1</code>(1/2) を配置します。
    </p>
    
    <div class="form-group" style="margin-bottom: 20px;">
        <label>📁 対象の .mcファイルを選択</label>
        <input type="file" id="mcFile" accept="*/*">
    </div>

    <div id="rangesContainer">
        <div class="range-group clearfix" id="range-0">
            <h4>範囲 1</h4>
            <div class="form-group">
                <label>始点Beat</label>
                <input type="text" class="startBeat" placeholder="例: 449, 0, 1">
            </div>
            <div class="form-group">
                <label>終点Beat</label>
                <input type="text" class="endBeat" placeholder="例: 460, 0, 0">
            </div>
            <button type="button" class="btn-remove" onclick="removeRange('range-0')">🗑️ 削除</button>
        </div>
    </div>

    <button type="button" class="btn-add" onclick="addRange()">➕ 選択範囲を追加する</button>
    <button type="button" class="btn-process" onclick="processMC()">⚡ 縮合結合を実行</button>

    <div id="resultMsg"></div>
    <a id="dlLink" href="#">💾 結合済みファイルをダウンロード</a>
</div>

<script>
let rangeIdCounter = 1;

function addRange() {
    const container = document.getElementById("rangesContainer");
    const id = "range-" + rangeIdCounter++;
    const html = `<div class="range-group clearfix" id="${id}"><h4>範囲指定</h4><div class="form-group"><label>始点Beat</label><input type="text" class="startBeat" placeholder="例: 449, 0, 1"></div><div class="form-group"><label>終点Beat</label><input type="text" class="endBeat" placeholder="例: 460, 0, 0"></div><button type="button" class="btn-remove" onclick="removeRange('${id}')">🗑️ 削除</button></div>`;
    container.insertAdjacentHTML('beforeend', html);
    updateRangeLabels();
}

function removeRange(id) {
    const container = document.getElementById("rangesContainer");
    if (container.children.length <= 1) { alert("最低でも1つの範囲指定が必要です！"); return; }
    document.getElementById(id).remove();
    updateRangeLabels();
}

function updateRangeLabels() {
    const groups = document.querySelectorAll('.range-group h4');
    groups.forEach((el, index) => { el.innerText = `範囲 ${index + 1}`; });
}

function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }

function safeBeat(beat) {
    if (!beat || !Array.isArray(beat) || beat.length < 3) return [0, 0, 1];
    return [beat[0], beat[1], beat[2] === 0 ? 1 : beat[2]];
}

function beatToPoint(beat) {
    let b = safeBeat(beat);
    return b[0] + (b[1] / b[2]);
}

function parseBeat(str) {
    if (!str) return null;
    str = str.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));
    const parts = str.match(/-?\d+/g);
    if (parts && parts.length >= 3) { return [Number(parts[0]), Number(parts[1]), Number(parts[2])]; }
    return null;
}

function limitDenom(beat, maxDenom = 100000) {
    let m = beat[0], n = beat[1] || 0, d = beat[2] === 0 ? 1 : (beat[2] || 1);
    if (n === 0) return [m, 0, 1];
    let g = Math.abs(gcd(n, d));
    n /= g; d /= g;
    if (d > maxDenom) {
        let val = n / d;
        let newNum = Math.round(val * maxDenom);
        let newDen = maxDenom;
        let g2 = Math.abs(gcd(newNum, newDen));
        return [m, newNum / g2, newDen / g2];
    }
    return [m, n, d];
}

function beatDiff(beat1, beat2) {
    const b1 = safeBeat(beat1), b2 = safeBeat(beat2);
    const num1 = (b1[0] * b1[2] + b1[1]) * b2[2], num2 = (b2[0] * b2[2] + b2[1]) * b1[2], den = b1[2] * b2[2];
    let diffNum = num1 - num2;
    if (diffNum < 0) diffNum = 0;
    return limitDenom([Math.floor(diffNum / den), diffNum % den, den]);
}

function beatAdd(beat1, beat2) {
    const b1 = safeBeat(beat1), b2 = safeBeat(beat2);
    const num1 = b1[1] * b2[2], num2 = b2[1] * b1[2], den = b1[2] * b2[2];
    let num = num1 + num2;
    return limitDenom([b1[0] + b2[0] + Math.floor(num / den), num % den, den]);
}

function beatDiv(beat, divisor) {
    const b = safeBeat(beat);
    const num = b[0] * b[2] + b[1], den = b[2] * divisor;
    return limitDenom([Math.floor(num / den), num % den, den]);
}

function fixDuplicateSegs(segArray) {
    let usedPoints = [], fixedCount = 0;
    const MICRO_DEN = 100000;
    function addMicroOffset(beat, offsetCount) {
        return limitDenom(beatAdd(beat, [0, offsetCount, MICRO_DEN]));
    }
    for (let i = 0; i < segArray.length; i++) {
        if (segArray[i].isMain) usedPoints.push(beatToPoint(segArray[i].beat));
    }
    for (let i = 0; i < segArray.length; i++) {
        let segItem = segArray[i];
        if (segItem.isMain) { delete segItem.isMain; continue; }
        let p = beatToPoint(segItem.beat), conflictCount = 0, currentP = p;
        while (true) {
            let isConflict = false;
            for (let j = 0; j < usedPoints.length; j++) {
                if (Math.abs(currentP - usedPoints[j]) < 1e-5) { isConflict = true; break; }
            }
            if (!isConflict) break;
            conflictCount++;
            currentP = p + (conflictCount / MICRO_DEN);
        }
        if (conflictCount > 0) { segItem.beat = addMicroOffset(segItem.beat, conflictCount); fixedCount++; }
        usedPoints.push(currentP);
    }
    return fixedCount;
}

function processMC() {
    const fileInput = document.getElementById("mcFile"), msgDiv = document.getElementById("resultMsg"), dlLink = document.getElementById("dlLink");
    msgDiv.innerHTML = ""; dlLink.style.display = "none";
    if (!fileInput.files.length) return msgDiv.innerHTML = "ファイルを選択してください。";

    const rangeGroups = document.querySelectorAll('.range-group'), ranges = [];
    for (let i = 0; i < rangeGroups.length; i++) {
        const startBeat = parseBeat(rangeGroups[i].querySelector('.startBeat').value), endBeat = parseBeat(rangeGroups[i].querySelector('.endBeat').value);
        if (!startBeat || !endBeat) return msgDiv.innerHTML = `⚠️ 範囲 ${i + 1} のBeat形式が不正です。`;
        ranges.push({ min: Math.min(beatToPoint(startBeat), beatToPoint(endBeat)), max: Math.max(beatToPoint(startBeat), beatToPoint(endBeat)), index: i+1 });
    }

    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const data = JSON.parse(e.target.result.replace(/^\uFEFF/, '').trim());
            const notes = data.note; let allDeletedNotes = new Set(), totalJoinedCount = 0, resultLogs = [];

            for (let range of ranges) {
                const targetSlides = notes.filter(n => !allDeletedNotes.has(n) && n.seg && Array.isArray(n.seg) && beatToPoint(n.beat) >= range.min - 0.001 && beatToPoint(n.beat) <= range.max + 0.001);
                if (targetSlides.length < 2) { resultLogs.push(`⚠️ 範囲 ${range.index}: スライド不足`); continue; }

                targetSlides.sort((a, b) => beatToPoint(a.beat) - beatToPoint(b.beat));
                const mainSlide = targetSlides[0], mainBeat = mainSlide.beat, mainX = mainSlide.x || 0;
                const mainOriginalSegs = mainSlide.seg || [], branches = targetSlides.slice(1);
                const shiftBaseBeat = [0, 1, 99], branchEvents = [];

                for (let branch of branches) {
                    const offsetX = (branch.x || 0) - mainX, origOffset = beatDiff(branch.beat, mainBeat);
                    const compOffset = beatAdd(shiftBaseBeat, beatDiv(origOffset, 100));
                    const lastSegBeat = branch.seg.length > 0 ? branch.seg[branch.seg.length - 1].beat : [0,0,0];
                    const compEndRel = beatAdd(compOffset, beatDiv(lastSegBeat, 100));
                    branchEvents.push({ compOffset, compEndRel, segs: branch.seg, offsetX });
                }

                branchEvents.sort((a, b) => beatToPoint(a.compEndRel) - beatToPoint(b.compEndRel));
                const newSeg = [];

                // 1. 全ての装飾（枝）ブロックを構築
                for (let ev of branchEvents) {
                    newSeg.push({ beat: [...ev.compEndRel], x: 0 });
                    for (let j = ev.segs.length - 1; j >= 0; j--) {
                        newSeg.push({ beat: beatAdd(ev.compOffset, beatDiv(ev.segs[j].beat, 100)), x: ev.offsetX + ev.segs[j].x });
                    }
                    newSeg.push({ beat: [...ev.compOffset], x: ev.offsetX });
                    for (let j = 0; j < ev.segs.length; j++) {
                        newSeg.push({ beat: beatAdd(ev.compOffset, beatDiv(ev.segs[j].beat, 100)), x: ev.offsetX + ev.segs[j].x });
                    }
                    newSeg.push({ beat: [...ev.compEndRel], x: 0 });
                }

                // 2. ★ 枝の挿入が完了した直後に、配列順序として x=0 のカドを挿入 ★
                if (branchEvents.length > 0) {
                    const lastEv = branchEvents[branchEvents.length - 1];
                    if (lastEv.offsetX >= 0) {
                        // 時間は装飾終点のまま配列に追加。この次が幹(0地点)ならデータ上で逆行する
                        newSeg.push({ beat: [...lastEv.compEndRel], x: 0 });
                    }
                }

                // 3. 最後に幹の本来のsegを結合
                for (let s of mainOriginalSegs) {
                    let mClone = JSON.parse(JSON.stringify(s)); mClone.isMain = true; newSeg.push(mClone);
                }

                fixDuplicateSegs(newSeg); mainSlide.seg = newSeg;
                branches.forEach(b => allDeletedNotes.add(b));
                totalJoinedCount += targetSlides.length;
                resultLogs.push(`✅ 範囲 ${range.index}: ${targetSlides.length}個結合`);

                data.effect.push({ beat: beatAdd(mainBeat, [0, 1, 99]), scroll: 30 });
                data.effect.push({ beat: beatAdd(mainBeat, [0, 1, 4]), jump: 9999999 });
                data.effect.push({ beat: beatAdd(mainBeat, [0, 1, 2]), scroll: 0.3 });
            }

            data.note = notes.filter(n => !allDeletedNotes.has(n));
            data.effect.sort((a, b) => beatToPoint(safeBeat(a.beat)) - beatToPoint(safeBeat(b.beat)));
            const blob = new Blob([JSON.stringify(data)], { type: "application/octet-stream" });
            dlLink.href = URL.createObjectURL(blob); dlLink.download = "processed.mc"; dlLink.style.display = "block";
            msgDiv.innerHTML = `成功: ${totalJoinedCount}個のスライドを処理しました。`;
        } catch (err) { console.error(err); msgDiv.innerHTML = "解析失敗"; }
    };
    reader.readAsText(fileInput.files[0]);
}
</script>
</body>
</html>
