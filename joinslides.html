<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>直列マージツール</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; color: #333; }
        .container { background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        h1 { font-size: 1.4em; text-align: center; margin-bottom: 20px; color: #222; }
        .desc { font-size: 0.85em; color: #555; margin-top: -10px; margin-bottom: 20px; line-height: 1.4; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; }
        input[type="text"], input[type="file"] { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 1em; }
        textarea.beatList { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 1em; font-family: monospace; resize: vertical; }
        
        .radio-group { background: #e3f2fd; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #bbdefb; }
        .radio-group label { display: block; margin-bottom: 10px; cursor: pointer; font-weight: normal; }
        .radio-group label:last-child { margin-bottom: 0; }
        
        .mode-group { background: #fff3e0; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ffe0b2; }
        .mode-group label { display: block; margin-bottom: 10px; cursor: pointer; font-weight: normal; }
        .mode-group label:last-child { margin-bottom: 0; }
        
        .range-group { background: #f9f9f9; border: 2px solid #e2e8f0; border-radius: 8px; padding: 15px; margin-bottom: 15px; position: relative; }
        .range-group h4 { margin-top: 0; margin-bottom: 15px; font-size: 1.1em; color: #4a5568; border-bottom: 2px solid #e2e8f0; padding-bottom: 5px; }
        
        button { padding: 12px 20px; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1em; width: 100%; font-weight: bold; transition: 0.2s; margin-top: 10px; }
        .btn-add { background: #17a2b8; margin-bottom: 20px; }
        .btn-add:hover { background: #138496; }
        .btn-remove { background: #dc3545; padding: 8px 15px; margin-top: 5px; font-size: 0.9em; width: auto; float: right; }
        .btn-remove:hover { background: #c82333; }
        .btn-process { background: #007bff; font-size: 1.1em; padding: 15px; box-shadow: 0 4px 6px rgba(0, 123, 255, 0.3); }
        .btn-process:hover { background: #0056b3; }
        
        .clearfix::after { content: ""; clear: both; display: table; }
        #dlLink { display: none; margin-top: 20px; text-align: center; padding: 15px; background: #28a745; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; transition: 0.2s; box-shadow: 0 4px 6px rgba(40, 167, 69, 0.3); }
        #dlLink:hover { background: #218838; }
        #resultMsg { margin-top: 15px; font-size: 0.9em; font-weight: bold; line-height: 1.6; }
        .log-box { background: #f8f9fa; border: 1px solid #dee2e6; padding: 10px; border-radius: 4px; max-height: 200px; overflow-y: auto; font-size: 0.85em; font-family: monospace; color: #555; margin-top: 10px; }
        .error-log { color: #d32f2f; background: #ffebee; border-color: #f5c6cb; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔗 直列マージツール</h1>
    <p class="desc">
        選択されたノーツを時間順に並べ、<b>1つの連続したスライド</b>に結合します。<br>
        ※直角スライド等で同じタイミングにノーツが重なった場合でも、1万分の1ずらしで自動補正されます。
    </p>
    
    <div class="form-group" style="margin-bottom: 20px;">
        <label>📁 対象の .mcファイルを選択</label>
        <input type="file" id="mcFile" accept="*/*">
    </div>

    <!-- 結合対象のノーツ種別 -->
    <div class="radio-group">
        <label style="font-weight: bold; margin-bottom: 10px; color: #0d47a1;">🎯 結合対象にするノーツ</label>
        <label>
            <input type="checkbox" id="targetWipe" checked> <b>Wipeノーツ / スライド</b> (type: 4)
        </label>
        <label>
            <input type="checkbox" id="targetTap" checked> <b>通常ノーツ / Tap</b> (type指定なし、または 1)
        </label>
    </div>

    <!-- 選択方式の切り替え -->
    <div class="mode-group">
        <label style="font-weight: bold; margin-bottom: 10px; color: #e65100;">⚙️ ノーツの選択方式</label>
        <label>
            <input type="radio" name="selectMode" value="range" checked onchange="switchMode()"> <b>範囲指定</b>
            <span style="font-size:0.85em; color:#666; margin-left:25px; display:block;">指定した始点から終点の間にあるすべてのノーツを結合します。</span>
        </label>
        <label style="margin-top: 5px;">
            <input type="radio" name="selectMode" value="exact" onchange="switchMode()"> <b>タイミング完全指定</b>
            <span style="font-size:0.85em; color:#666; margin-left:25px; display:block;">指定した「特定のBeat上」にあるノーツのみを結合します。</span>
        </label>
    </div>

    <div id="rangesContainer">
        <!-- JSでボックスが挿入されます -->
    </div>

    <button type="button" class="btn-add" onclick="addRange()">➕ 結合グループを追加する</button>
    <button type="button" class="btn-process" onclick="processMC()">✨ 直列マージを実行</button>

    <div id="resultMsg"></div>
    <a id="dlLink" href="#">💾 結合済みファイルをダウンロード</a>
</div>

<script>
let rangeIdCounter = 1;
let currentMode = "range";

// 初回読み込み時に表示
window.onload = function() {
    addRange();
};

function switchMode() {
    currentMode = document.querySelector('input[name="selectMode"]:checked').value;
    document.getElementById("rangesContainer").innerHTML = "";
    rangeIdCounter = 1;
    addRange();
}

function addRange() {
    const container = document.getElementById("rangesContainer");
    const id = "group-" + rangeIdCounter++;
    
    let html = "";
    if (currentMode === "range") {
        html = `
        <div class="range-group clearfix" id="${id}">
            <h4>結合グループ 1</h4>
            <div class="form-group">
                <label>始点Beat</label>
                <input type="text" class="startBeat" placeholder="例: 10, 0, 1">
            </div>
            <div class="form-group">
                <label>終点Beat</label>
                <input type="text" class="endBeat" placeholder="例: 15, 0, 0">
            </div>
            <button type="button" class="btn-remove" onclick="removeRange('${id}')">🗑️ 削除</button>
        </div>
        `;
    } else {
        html = `
        <div class="range-group clearfix" id="${id}">
            <h4>結合グループ 1</h4>
            <div class="form-group">
                <label>対象のBeat (1行に1つずつ入力)</label>
                <textarea class="beatList" rows="4" placeholder="例:\n10, 0, 1\n10, 0, 1\n11, 0, 1\n12, 1, 4"></textarea>
            </div>
            <button type="button" class="btn-remove" onclick="removeRange('${id}')">🗑️ 削除</button>
        </div>
        `;
    }
    
    container.insertAdjacentHTML('beforeend', html);
    updateRangeLabels();
}

function removeRange(id) {
    const container = document.getElementById("rangesContainer");
    if (container.children.length <= 1) {
        alert("最低でも1つの結合グループが必要です！");
        return;
    }
    document.getElementById(id).remove();
    updateRangeLabels();
}

function updateRangeLabels() {
    const groups = document.querySelectorAll('.range-group h4');
    groups.forEach((el, index) => {
        el.innerText = `結合グループ ${index + 1}`;
    });
}

function safeBeat(beat) {
    if (!beat || !Array.isArray(beat) || beat.length < 3) return[0, 0, 1];
    return [beat[0], beat[1], beat[2] === 0 ? 1 : beat[2]];
}

function beatToPoint(beat) {
    let b = safeBeat(beat);
    return b[0] + (b[1] / b[2]);
}

function parseBeat(str) {
    if (!str) return null;
    str = str.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));
    const parts = str.match(/-?\d+/g);
    if (parts && parts.length >= 3) {
        return [Number(parts[0]), Number(parts[1]), Number(parts[2])];
    }
    return null;
}

function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }

function beatAdd(beat1, beat2) {
    let b1 = safeBeat(beat1), b2 = safeBeat(beat2);
    const m1 = b1[0], n1 = b1[1], d1 = b1[2];
    const m2 = b2[0], n2 = b2[1], d2 = b2[2];
    const num1 = n1 * d2;
    const num2 = n2 * d1;
    const den = d1 * d2;
    let num = num1 + num2;
    let m = m1 + m2 + Math.floor(num / den);
    let n = num % den;
    if (n === 0) return [m, 0, 0];
    const g = gcd(n, den);
    return[m, n / g, den / g];
}

function beatSub(beat1, beat2) {
    let b1 = safeBeat(beat1), b2 = safeBeat(beat2);
    const m1 = b1[0], n1 = b1[1], d1 = b1[2];
    const m2 = b2[0], n2 = b2[1], d2 = b2[2];
    const num1 = (m1 * d1 + n1) * d2;
    const num2 = (m2 * d2 + n2) * d1;
    const den = d1 * d2;
    let diffNum = num1 - num2;
    if (diffNum < 0) diffNum = 0; 
    const m = Math.floor(diffNum / den);
    const n = diffNum % den;
    if (n === 0) return[m, 0, 0];
    const g = gcd(n, den);
    return[m, n / g, den / g];
}

// 完全にダブるBeatを1万分の1ずらしてバグを回避するパトロール関数
function fixDuplicateSegs(segArray) {
    let usedPoints = [0]; // 始点(0,0,0)は常に存在するため最初から登録
    let fixedCount = 0;
    const MICRO_DEN = 10000; 
    
    function addMicroOffset(beat, offsetCount) {
        if (!beat || beat.length !== 3 || offsetCount === 0) return beat;
        const m = beat[0], n = beat[1] || 0, d = beat[2] === 0 ? 1 : beat[2];
        let newNum = n * MICRO_DEN + offsetCount * d;
        let newDen = d * MICRO_DEN;
        let extraM = Math.floor(newNum / newDen);
        let newM = m + extraM;
        newNum = newNum % newDen;
        if (newNum === 0) return[newM, 0, 0];
        let g = gcd(newNum, newDen);
        return[newM, newNum / g, newDen / g];
    }

    for (let i = 0; i < segArray.length; i++) {
        let segItem = segArray[i];
        let p = beatToPoint(segItem.beat);
        
        let conflictCount = 0;
        let currentP = p;
        
        while (true) {
            let isConflict = false;
            for (let j = 0; j < usedPoints.length; j++) {
                if (Math.abs(currentP - usedPoints[j]) < 1e-5) {
                    isConflict = true;
                    break;
                }
            }
            if (!isConflict) break;
            
            conflictCount++;
            currentP = p + (conflictCount / MICRO_DEN);
        }
        
        if (conflictCount > 0) {
            segItem.beat = addMicroOffset(segItem.beat, conflictCount);
            fixedCount++;
        }
        usedPoints.push(currentP);
    }
    return fixedCount;
}

function processMC() {
    const fileInput = document.getElementById("mcFile");
    const targetWipe = document.getElementById("targetWipe").checked;
    const targetTap = document.getElementById("targetTap").checked;
    const selectMode = document.querySelector('input[name="selectMode"]:checked').value;
    
    const msgDiv = document.getElementById("resultMsg");
    const dlLink = document.getElementById("dlLink");
    
    msgDiv.innerHTML = "";
    dlLink.style.display = "none";

    if (!fileInput.files.length) {
        msgDiv.style.color = "#d32f2f";
        return msgDiv.innerHTML = "ファイルを選択してください。";
    }

    if (!targetWipe && !targetTap) {
        msgDiv.style.color = "#d32f2f";
        return msgDiv.innerHTML = "変換対象にするノーツ（Wipe または Tap）にチェックを入れてください。";
    }

    const rangeGroups = document.querySelectorAll('.range-group');
    const parsedGroups =[];
    
    // 入力データの解析
    for (let i = 0; i < rangeGroups.length; i++) {
        let groupObj = { index: i + 1, type: selectMode };
        
        if (selectMode === "range") {
            const startStr = rangeGroups[i].querySelector('.startBeat').value;
            const endStr = rangeGroups[i].querySelector('.endBeat').value;
            const startBeat = parseBeat(startStr);
            const endBeat = parseBeat(endStr);
            
            if (!startBeat || !endBeat) {
                msgDiv.style.color = "#d32f2f";
                return msgDiv.innerHTML = `⚠️ 結合グループ ${i + 1} のBeatフォーマットが正しくありません。`;
            }
            const startPoint = beatToPoint(startBeat);
            const endPoint = beatToPoint(endBeat);
            groupObj.min = Math.min(startPoint, endPoint);
            groupObj.max = Math.max(startPoint, endPoint);
            
        } else {
            const textStr = rangeGroups[i].querySelector('.beatList').value;
            const lines = textStr.split('\n');
            const points =[];
            
            for (let line of lines) {
                if (line.trim() === "") continue;
                let b = parseBeat(line);
                if (b) {
                    points.push(beatToPoint(b));
                }
            }
            if (points.length < 2) {
                msgDiv.style.color = "#d32f2f";
                return msgDiv.innerHTML = `⚠️ 結合グループ ${i + 1} で指定された有効なBeatが2つ未満です。改行して2つ以上入力してください。`;
            }
            groupObj.points = points;
        }
        parsedGroups.push(groupObj);
    }

    const file = fileInput.files[0];
    const reader = new FileReader();
    
    reader.onload = function(e) {
        try {
            let rawStr = e.target.result;
            let cleanStr = rawStr.replace(/^\uFEFF/, '').trim();
            const data = JSON.parse(cleanStr);
            
            if (!data.note || !Array.isArray(data.note)) {
                throw new Error("譜面データに note 配列が存在しません。");
            }

            const notes = data.note;
            let allDeletedNotes = new Set();
            let totalJoinedCount = 0;
            let logTexts =[];

            for (let r = 0; r < parsedGroups.length; r++) {
                const group = parsedGroups[r];
                const targetNotes =[];

                // グループ条件に合致するノーツを抽出
                for (let i = 0; i < notes.length; i++) {
                    const note = notes[i];
                    if (allDeletedNotes.has(note)) continue;

                    if (typeof note.x === 'number') {
                        let nType = note.type || 1;
                        let isTarget = false;
                        
                        if (targetTap && nType === 1) isTarget = true;
                        if (targetWipe && nType === 4) isTarget = true;

                        if (isTarget) {
                            const point = beatToPoint(safeBeat(note.beat));
                            
                            if (group.type === "range") {
                                if (point >= group.min - 0.001 && point <= group.max + 0.001) {
                                    note._origIdx = i; // 同じ時間になった時の並び替え保護用
                                    targetNotes.push(note);
                                }
                            } else {
                                // タイミング完全指定 (分数約分の違いもここで吸収して一致判定)
                                let match = false;
                                for (let p of group.points) {
                                    if (Math.abs(point - p) < 1e-5) {
                                        match = true;
                                        break;
                                    }
                                }
                                if (match) {
                                    note._origIdx = i;
                                    targetNotes.push(note);
                                }
                            }
                        }
                    }
                }

                if (targetNotes.length < 2) {
                    logTexts.push(`<span style="color:#d32f2f;">⚠️ グループ ${group.index}: 対象ノーツが2つ未満のためスキップ</span>`);
                    continue;
                }

                // 1. ノーツを時間が早い順にソート。同じ時間なら入力(配置)された順番を保持する
                targetNotes.sort((a, b) => {
                    let pA = beatToPoint(safeBeat(a.beat));
                    let pB = beatToPoint(safeBeat(b.beat));
                    if (Math.abs(pA - pB) > 1e-5) {
                        return pA - pB;
                    }
                    return a._origIdx - b._origIdx;
                });
                
                // メインとなる最初のノーツ
                const mainSlide = targetNotes[0];
                const mainBeat = safeBeat(mainSlide.beat);
                const mainX = mainSlide.x;

                let absPoints =[]; 

                if (mainSlide.seg && Array.isArray(mainSlide.seg)) {
                    for (let s of mainSlide.seg) {
                        absPoints.push({
                            beat: beatAdd(mainBeat, s.beat),
                            x: mainX + s.x
                        });
                    }
                }

                // 2番目以降のノーツを処理
                for (let i = 1; i < targetNotes.length; i++) {
                    let note = targetNotes[i];
                    let nBeat = safeBeat(note.beat);
                    let nX = note.x;

                    absPoints.push({ beat: nBeat, x: nX });

                    if (note.seg && Array.isArray(note.seg)) {
                        for (let s of note.seg) {
                            absPoints.push({ beat: beatAdd(nBeat, s.beat), x: nX + s.x });
                        }
                    }
                }

                let newSeg =[];
                
                // メインからの「相対Beat」「相対X座標」に変換
                for (let p of absPoints) {
                    newSeg.push({
                        beat: beatSub(p.beat, mainBeat),
                        x: p.x - mainX
                    });
                }

                // 同時押し(直角スライド等)による重複バグを微小ずらしで回避
                let fixCount = fixDuplicateSegs(newSeg);
                mainSlide.seg = newSeg;

                for (let i = 1; i < targetNotes.length; i++) {
                    allDeletedNotes.add(targetNotes[i]);
                }

                totalJoinedCount += targetNotes.length;
                let fixMsg = fixCount > 0 ? ` (重複 ${fixCount}箇所を自動補正✨)` : "";
                logTexts.push(`<span style="color:#28a745;">✅ グループ ${group.index}: ${targetNotes.length}個のノーツを結合しました${fixMsg}</span>`);
            }

            if (totalJoinedCount === 0) {
                msgDiv.style.color = "#d32f2f";
                return msgDiv.innerHTML = "指定された条件で結合可能なノーツが見つかりませんでした。";
            }

            data.note = data.note.filter(n => !allDeletedNotes.has(n));

            const outJson = JSON.stringify(data); 
            const blob = new Blob([outJson], { type: "application/octet-stream" });
            const url = URL.createObjectURL(blob);
            
            dlLink.href = url;
            let originalName = file.name;
            let dotIndex = originalName.lastIndexOf('.');
            if(dotIndex !== -1) { originalName = originalName.substring(0, dotIndex); }
            dlLink.download = originalName + "_merged.mc";
            
            dlLink.style.display = "block";
            
            msgDiv.style.color = "#28a745";
            msgDiv.innerHTML = `<b>🎉 結合完了！ 合計 ${totalJoinedCount}個 のノーツを処理しました！</b><br>
            <div class="log-box">${logTexts.join("<br>")}</div>`;

        } catch (err) {
            console.error(err);
            msgDiv.style.color = "#d32f2f";
            msgDiv.innerHTML = `<b>ファイルの解析に失敗しました。</b><br>
            <div class="log-box error-log">エラー詳細：<br>${err.message}</div>`;
        }
    };
    reader.readAsText(file);
}
</script>

</body>
</html>
